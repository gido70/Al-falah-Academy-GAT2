*{box-sizing:border-box}body{margin:0;font-family:Cairo,Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#e8f0fa,#f7fbff);color:var(--text);direction:rtl}.wrap{max-width:1220px;margin:auto;padding:16px 16px 70px}.hero{background:var(--grad);border-radius:24px;padding:28px 24px;color:#fff;text-align:center;box-shadow:0 14px 36px rgba(12,68,124,.25);position:relative;overflow:hidden}.hero:before{content:'';position:absolute;inset:auto -80px -100px auto;width:330px;height:330px;border-radius:50%;background:rgba(255,255,255,.07)}.logo{display:block;max-width:230px;width:60%;margin:0 auto 14px;background:rgba(255,255,255,.96);padding:12px 20px;border-radius:18px;position:relative;z-index:1}.hero h1{margin:0;font-size:30px;font-weight:900}.hero p{margin:8px 0 0;color:rgba(255,255,255,.9)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 17px;border-radius:14px;text-decoration:none;border:0;font-family:Cairo,sans-serif;font-weight:900;cursor:pointer;transition:.18s}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.14)}.primary{background:#fff;color:var(--navy)}.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:#fff}.teal{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff}.outline{background:#fff;border:2px solid var(--border);color:var(--navy)}.card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:0 4px 18px rgba(12,68,124,.08);margin:16px 0}.card h2,.card h3{margin:0 0 12px;color:var(--navy);font-weight:900}.muted{color:var(--muted);font-size:14px}.filters{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}label{display:block;font-weight:900;color:var(--navy);margin-bottom:6px}select,textarea,input{width:100%;border:2px solid var(--border);border-radius:13px;padding:10px 12px;font-family:Cairo,sans-serif;font-size:14px;background:#f8f px}.director-mode .hero{padding:24px}.director-mode .hero h1{font-size:25px}.director-feedback{border-right:6px solid var(--teal);background:#f8fbff}.fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fb-status{margin-top:10px;color:var(--green);font-weight:800}.chartbox{height:320px}.mini-chart{height:250px}.mobile-brief{display:none}

<section class="card filters-card"><h2>خيارات التقرير</h2><div class="filters"><div><label>نوع التقرير</label><select id="type" class="report-control"><option value="">— بدون تحديد —</option><option value="all">تقرير شامل</option><option value="evaluation">تقييم المكتبات</option><option value="work">الدوام والزيارات</option><option value="school">تقرير مدرسة</option><option value="special">موضوع خاص</option></select></div><div><label>المدرسة</label><select id="school" class="report-control"><option value="">— بدون تحديد —</option><option value="all">كل المدارس</option><option value="khb">الخبيصي</option><option value="jmi">الجيمي</option><option value="shj">الشارقة</option><option value="bny">بني ياس</option><option value="mzd">محمد بن زايد</option><option value="dan">الدانة</option></select></div><div><label>الشهر</label><select id="month" class="report-control"><option value="">— بدون تحديد —</option><option value="all">كل الشهور</option><option value="04">أبريل</option><option value="05">مايو</option><option value="06">يونيو</option><option value="07">يوليو</option><option value="08">أغسطس</option><option value="09">سبتمبر</option><option value="10">أكتوبر</option><option value="11">نوفمبر</option><option value="12">ديسمبر</option></select></div><div><label>الأسبوع</label><select id="week" class="report-control"><option value="">— بدون تحديد —</option><option value="all">كل الأسابيع</option><option value="1">الأسبوع 1</option><option value="2">الأسبوع 2</option><option value="3">الأسبوع 3</option><option value="4">الأسبوع 4</option><option value="5">الأسبوع 5</option></select></div><div><label>مستوى العرض</label><select id="level" class="report-control"><option value="">— بدون تحديد —</option><option value="brief">مختصر</option><option value="detailed">تفصيلي</option></select></div><div><label>عنوان خاص</label><input id="title" class="report-control" placeholder="مثال: تقرير متابعة مكتبة الحلقة الأولى"></div></div><label style="margin-top:12px">ملاحظات أو توجيه خ <script>
const SCHOOLS=[{id:'khb',short:'الخبيصي',name:'أكاديمية الفلاح فرع الخبيصي',city:'العين'},{id:'jmi',short:'الجيمي',name:'أكاديمية الفلاح فرع الجيمي',city:'العين'},{id:'shj',short:'الشارقة',name:'مدرسة الفلاح الخاصة - الدخيلات',city:'الشارقة'},{id:'bny',short:'بني ياس',name:'أكاديمية الفلاح فرع بني ياس',city:'أبوظبي'},{id:'mzd',short:'محمد بن زايد',name:'أكاديمية الفلاح فرع محمد بن زايد',city:'أبوظبي'},{id:'dan',short:'الدانة',name:'أكاديمية الفلاح فرع الدانة',city:'أبوظبي'}];
const LABELS={r_uae:'المجموعات والمصادر',r_cd:'تنوع المجموعات',r_cc:'حداثة المجموعات',r_sh:'تنظيم الأرفف',r_cr:'الإعارة والسجلات',r_sp:'جاهزية المكان',r_se:'أماكن القراءة',r_at:'البيئة الجاذبة',r_in:'الإرشادات',r_rch:'تحدي القراءة',r_tu:'استخدام المعلمين',r_cu:'ربط المنهاج',r_ri:'المبادرات',r_pa:'الشراكات',r_ts:'الدعم الفني',r_ss:'الأمن والسلامة',r_sb:'المبنى والمرافق',r_sc:'التجهيزات',r_dg:'المصادر الرقمية',r_te:'التقنية'};
const RM={'ضعيف':2,'مقبول':3.5,'جيد':4,'جيدة':4,'جيد جداً':5,'جيدة جداً':5,'متميز':6,'ممتاز':6};let CHARTS=[],REMOTE_EVAL=[],REMOTE_WEEK=[];const q=new URLSearchParams(location.search);const director=q.get('director')==='1';document.body.classList.toggle('director-mode',director);
function esc(x){return String(x??'—').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}function load(k,def){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(def))}catch(e){return def}}function schoolBy(id){return SCHOOLS.find(s=>s.id===id)||null}function monthName(m){return ({'04':'أبريل','05':'مايو','06':'يونيو','07':'يوليو','08':'أغسطس','09':'سبتمبر','10':'أكتوبر','11':'نوفمبر','12':'ديسمبر'})[m]||''}function monthFromDate(d){return String(d||'').match(/-(\d{2})-/)?.[1]||''}function level(v){v=Number(v||0);if(v>=5)return'متميزة';if(v>=4)return'جيدة جداً';if(v>=3)return'مقبولة';if(v>0)return'تحتاج تحسين';return'غير مكتملة'}function scoreVals(d){return Object.keys(LABELS).map(k=>Number(d?.[k]||0)).filter(v=>v>0)}function avg(vals){vals=vals.map(Number).filter(v=>!isNaN(v));return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0}function evalAvg(d){return avg(scoreVals(d))}function booksToScore(x){let n=parseInt(String(x||'').replace(/[^0-9]/g,''),10)||0;if(n>=3000)return 6;if(n>=1500)return 5;if(n>=500)return 4;if(n>0)return 3;return 0}function staffScore(d,l){let raw=(l&&l.staff)||(l&&l.specialist)||d?.staff||d?.librarian||'';return raw?100:0}function selected(){return {type:q.get('type')??elv('type'),school:q.get('school')??elv('school'),month:q.get('month')??elv('month'),week:q.get('week')??elv('week'),level:q.get('level')??elv('level'),title:q.get('title')??elv('title'),note:q.get('note')??elv('note')}}function elv(id){return document.getElementById(id)?.value||''}
function getEvalRowsLocal(){const db=load('falah_lib_v6',{ev:{}});let out=[];SCHOOLS.forEach(s=>{const d=db.ev?.[s.id];if(!d||!d.saved)return;let sc=evalAvg(d);out.push({school:s,library:d.lib||d.librarian||'المكتبة الرئيسية',kind:'رئيسية',score:sc,staff:staffScore(d,null),date:d.date||'',month:monthFromDate(d.date),raw:d});(Array.isArray(d.libraries)?d.libraries:[]).forEach((l,i)=>{let sc2=RM[l.rating]||booksToScore(l.books)||0;out.push({school:s,library:l.type||('مكتبة إضافية '+(i+1)),kind:'إضافية',score:sc2,staff:staffScore(d,l),date:d.date||'',month:monthFromDate(d.date),raw:l})})});return out}
function normWeeks(rows){const map=new Map();(rows||[]).forEach(w=>{let week=String(w.week||'').trim(),from=String(w.from||'').slice(0,10),to=String(w.to||from).slice(0,10),key=week+'|'+from+'|'+to;if(!map.has(key))map.set(key,{...w,week,from,to,month:w.month||monthFromDate(from),days:Array.isArray(w.days)?w.days:[],visits:Number(w.visits||0),tasks:Number(w.tasks||0),attendance:Number(w.attendance||0)});else{let e=map.get(key);e.visits=Math.max(e.visits,Number(w.visits||0));e.tasks=Math.max(e.tasks,Number(w.tasks||0));if((w.days||[]).some(d=>(d.type||d.task||d.note||d.in||d.out)))e.days=w.days}});return [...map.values()].sort((a,b)=>String(a.from).localeCompare(String(b.from))||String(a.week).localeCompare(String(b.week),undefined,{numeric:true}))}
function getWeekRowsLocal(){let rows=[];for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i);if(k==='falah_wp_final'||k.startsWith('falah_week_')){let d=load(k,null);if(!d)continue;let days=['mon','tue','wed','thu','fri'].map((day,j)=>({day:['الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'][j],type:d['atype'+j]||'',loc:d['dloc'+j]||'',task:d['dtasks'+j]||'',note:d['anote'+j]||'',in:d['ain'+j]||'',out:d['aout'+j]||''}));let visits=days.filter(x=>/زيارة|مدرسة|ميدانية/.test((x.type+' '+x.loc+' '+x.task))).length;let tasks=days.filter(x=>(x.task||x.type||x.note||'').trim()).length;let from=d.from||d.dateFrom||'',to=d.to||d.dateTo||from;rows.push({week:String(d.wnum||k.replace('falah_week_','')),from,to,status:d.wstatus||d.status||'',month:monthFromDate(from),days,visits,tasks,attendance:days.filter(x=>x.in||x.out||/دوام/.test(x.type)).length})}}return normWeeks(rows)}
function getEvalRows(){return REMOTE_EVAL.length?REMOTE_EVAL:getEvalRowsLocal()}function getWeekRows(){return REMOTE_WEEK.length?REMOTE_WEEK:getWeekRowsLocal()}
function filterData(){let s=selected();let evals=getEvalRows(),weeks=getWeekRows();if(s.school&&s.school!=='all')evals=evals.filter(r=>r.school.id===s.school);if(s.month&&s.month!=='all'){evals=evals.filter(r=>!r.month||r.month===s.month);weeks=weeks.filter(w=>w.month===s.month)}if(s.week&&s.week!=='all')weeks=weeks.filter(w=>String(w.week)===String(s.week));return {s,evals,weeks}}
function destroyCharts(){CHARTS.forEach(c=>{try{c.destroy()}catch(e){}});CHARTS=[]}function chart(id,type,data,options){if(!window.Chart)return;let c=new Chart(document.getElementById(id),{type,data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Cairo'}}}},scales:type==='doughnut'||type==='radar'?{}:{x:{ticks:{font:{family:'Cairo'}}},y:{beginAtZero:true,ticks:{font:{family:'Cairo'}}}},...options}});CHARTS.push(c)}
function render(){destroyCharts();let {s,evals,weeks}=filterData();if(director){document.getElementById('mainTitle').textContent='تقرير متابعة أداء مكتبات أكاديمية الفلاح';document.getElementById('subTitle').textContent='نسخة مختصرة للعرض الإداري — بدون روابط رجوع أو عناصر تشغيل داخلية.'}else{document.getElementById('mainTitle').textContent='التقرير التحليلي النهائي';document.getElementById('subTitle').textContent='تقرير تحليلي شامل للتقييمات، الدوام، الزيارات، المكتبات الإضافية، ونقاط القوة والضعف.'}let schoolText=s.school?(s.school==='all'?'كل المدارس':schoolBy(s.school)?.short):'غير محدد';let period=s.week?('الأسبوع '+s.week):(s.month?(s.month==='all'?'كل الشهور':monthName(s.month)):'غير محدد');let scores=evals.map(x=>Number(x.score||0)).filter(x=>x>0);let av=avg(scores), top=evals.filter(x=>x.score>0).sort((a,b)=>b.score-a.score)[0], low=evals.filter(x=>x.score>0).sort((a,b)=>a.score-b.score)[0];let title=s.title|| (s.type==='work'?'تقرير الدوام والزيارات':s.type==='evaluation'?'تقرير تقييم المكتبات':s.type==='school'?'تقرير مدرسة':s.type==='special'?'تقرير خاص':'تقرير شامل');document.getElementById('summaryCard').innerHTML=`<h2>${esc(title)}</h2><div class="smart-note"><b>الخلاصة:</b> يعرض التقرير ما تم اختياره فقط: <b>${esc(title)}</b> — النطاق: <b>${esc(schoolText)}</b> — الفترة: <b>${esc(period)}</b>. ${scores.length?'المتوسط الحالي '+av+' من 6، أعلى أداء: '+esc(top?.school.short)+'، والأكثر احتياجًا للتحسين: '+esc(low?.school.short)+'.':'لا توجد تقييمات مطابقة للاختيار الحالي.'} ${s.note?'<br><b>توجيه خاص:</b> '+esc(s.note):''}</div>`;document.getElementById('kpis').innerHTML=`<div class=kpi><strong>${evals.length}</strong><span>مكتبات داخل التقرير</span></div><div class=kpi><strong>${scores.length?av:'—'}</strong><span>متوسط التقييم من 6</span></div><div class=kpi><strong>${weeks.length}</strong><span>أسابيع عمل</span></div><div class=kpi><strong>${weeks.reduce((a,w)=>a+(+w.visits||0),0)}</strong><span>زيارات مسجلة</span></div><div class=kpi><strong>${weeks.reduce((a,w)=>a+(+w.tasks||0),0)}</strong><span>مهام مسجلة</span></div>`;renderCharts(evals,weeks,s);renderDetails(evals,weeks,s);if(director)renderFeedback(s)}
function renderCharts(evals,weeks,s){let schoolAgg={};evals.forEach(r=>{(schoolAgg[r.school.short]??=[]).push(+r.score||0)});let schoolNames=Object.keys(schoolAgg), schoolScores=schoolNames.map(k=>avg(schoolAgg[k]));let libNames=evals.map(r=>r.school.short+' / '+r.library).slice(0,14), libScores=evals.map(r=>+r.score||0).slice(0,14);let workLabels=weeks.map(w=>'أسبوع '+(w.week||'؟')).slice(0,12);let html='';if(evals.length){html+=`<div class="card"><h2>ترتيب المدارس</h2><div class="chartbox"><canvas id="chartSchools"></canvas></div></div><div class="card"><h2>تفصيل المكتبات</h2><div class="chartbox"><canvas id="chartLibraries"></canvas></div></div><div class="card"><h2>الخلاصة العامة بالنسب</h2><div class="mini-chart"><canvas id="chartSummary"></canvas></div></div>`}if(weeks.length){html+=`<div class="card"><h2>الدوام والزيارات والمهام</h2><div class="chartbox"><canvas id="chartWeeks"></canvas></div></div>`}if(!html)html='<div class="card full"><div class="note">لا توجد بيانات كافية للرسم حسب الاختيارات الحالية.</div></div>';document.getElementById('charts').innerHTML=html;setTimeout(()=>{if(evals.length){chart('chartSchools','bar',{labels:schoolNames,datasets:[{label:'متوسط المدرسة',data:schoolScores}]},{indexAxis:'y'});chart('chartLibraries','bar',{labels:libNames,datasets:[{label:'درجة المكتبة',data:libScores}]},{indexAxis:'y'});chart('chartSummary','doughnut',{labels:['الأداء العام','الفجوة التطويرية','الكادر المهني'],datasets:[{data:[Math.round(avg(libScores)/6*100)||0,Math.max(0,100-(Math.round(avg(libScores)/6*100)||0)),Math.round(avg(evals.map(x=>x.staff||0))||0)]}]},{})}if(weeks.length){chart('chartWeeks','bar',{labels:workLabels,datasets:[{label:'زيارات',data:weeks.map(w=>w.visits||0)},{label:'مهام',data:weeks.map(w=>w.tasks||0)},{label:'حضور/دوام',data:weeks.map(w=>w.attendance||0)}]},{})}},50)}
function renderDetails(evals,weeks,s){let levelDetail=s.level==='detailed'||(!director&&s.level!=='brief');let html='';if(evals.length)html+=`<h2>تفصيل تقييم المكتبات</h2><table><thead><tr><th>#</th><th>المدرسة</th><th>المكتبة</th><th>النوع</th><th>الدرجة</th><th>النسبة</th><th>الكادر المهني</th><th>المستوى</th></tr></thead><tbody>${evals.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.school.short)}</td><td>${esc(r.library)}</td><td>${esc(r.kind)}</td><td>${r.score||0}</td><td><b>${Math.round((r.score||0)/6*100)}%</b><div class=bar><div class=fill style="width:${Math.round((r.score||0)/6*100)}%"></div></div></td><td>${r.staff||0}%</td><td><span class="tag ${tag(r.score)}">${level(r.score)}</span></td></tr>`).join('')}</tbody></table>`;if(weeks.length){html+=`<h2 style="margin-top:18px">سجل الدوام والزيارات</h2>`;if(s.week&&s.week!=='all'){weeks.forEach(w=>{html+=`<div class="card"><h3>الأسبوع ${esc(w.week)} — ${esc(w.from)} إلى ${esc(w.to)}</h3><p class=muted>الحالة: ${esc(w.status)} — الزيارات: ${w.visits||0} — المهام: ${w.tasks||0}</p>${levelDetail?`<table><thead><tr><th>اليوم</th><th>الدوام/المهمة</th><th>الموقع</th><th>الملاحظة</th></tr></thead><tbody>${(w.days||[]).map(d=>`<tr><td>${esc(d.day)}</td><td>${esc(d.type||d.task)}</td><td>${esc(d.loc)}</td><td>${esc(d.note)}</td></tr>`).join('')}</tbody></table>`:''}</div>`})}else{html+=`<table><thead><tr><th>الأسبوع</th><th>الفترة</th><th>الحالة</th><th>زيارات</th><th>مهام</th><th>دوام</th></tr></thead><tbody>${weeks.map(w=>`<tr><td>الأسبوع ${esc(w.week)}</td><td>${esc(w.from)} - ${esc(w.to)}</td><td>${esc(w.status)}</td><td>${w.visits||0}</td><td>${w.tasks||0}</td><td>${w.attendance||0}</td></tr>`).join('')}</tbody></table>`}}document.getElementById('details').innerHTML=html||'<div class="note">لا توجد تفاصيل مطابقة للاختيارات الحالية.</div>'}
function renderFeedback(s){document.getElementById('directorFeedback').style.display='block';document.getElementById('directorFeedback').innerHTML=`<h2>تعليق المدير والتوصيات 💬</h2><p class="muted">يمكن للمدير اختيار رد سريع أو إضافة تعليق مختصر. الرد يحفظ في قاعدة البيانات ويظهر في صندوق ردود الإدارة.</p><div class="fb-grid"><div><label>نوع الرد</label><select id="decision"><option value="معتمد مع ملاحظات">معتمد مع ملاحظات</option><option value="معتمد">معتمد</option><option value="يحتاج تعديل">يحتاج تعديل</option><option value="توجيه للتنفيذ">توجيه للتنفيذ</option><option value="ملاحظة عامة">ملاحظة عامة</option></select></div><div><label>درجة الأهمية</label><select id="priority"><option>مهم</option><option>عادي</option><option>عاجل</option></select></div></div><label>تعليق أو توصية اختيارية</label><textarea id="comment" placeholder="اكتب تعليقك أو توصيتك هنا..."></textarea><div class="actions"><button class="btn teal" onclick="sendFeedback()">إرسال الرد ✅</button></div><div id="fbStatus" class="fb-status"></div>`}
async function sendFeedback(){let s=selected();let rec={report_type:s.type||'غير محدد',school_id:s.school||'',period:s.week?('week:'+s.week):(s.month?('month:'+s.month):''),decision:document.getElementById('decision').value,priority:document.getElementById('priority').value,comment:document.getElementById('comment').value.trim(),page_url:location.href,is_read:false,created_at:new Date().toISOString()};let ok=false;try{let c=window.alfalahSupabase||window.supabaseClient;if(c){let {error}=await c.from('director_feedback').insert([rec]);if(!error)ok=true;else console.warn(error)}}catch(e){console.warn(e)}let arr=load('director_feedback_local',[]);arr.unshift(rec);localStorage.setItem('director_feedback_local',JSON.stringify(arr.slice(0,50)));document.getElementById('fbStatus').textContent='✅ تم إرسال الرد '+(ok?'وحفظه في قاعدة البيانات.':'وحفظه محليًا. تأكد من جدول director_feedback إذا لم يظهر عند المشرف.');document.getElementById('comment').value=''}
function updateURL(){let u=new URL(location.href);['type','school','month','week','level','title','note'].forEach(id=>{let v=elv(id);if(v)u.searchParams.set(id,v);else u.searchParams.delete(id)});location.href=u.toString()}function copyDirectorLink(){let u=new URL(location.href);u.searchParams.set('director','1');['type','school','month','week','level','title','note'].forEach(id=>{let v=elv(id);if(v)u.searchParams.set(id,v);else u.searchParams.delete(id)});navigator.clipboard?.writeText(u.toString()).then(()=>alert('تم نسخ رابط المدير')).catch(()=>prompt('انسخ الرابط:',u.toString()))}function copyReportText(){let txt=document.body.innerText.replace(/\n{3,}/g,'\n\n');navigator.clipboard?.writeText(txt).then(()=>alert('تم نسخ نص التقرير')).catch(()=>prompt('انسخ النص:',txt))}
function initControls(){['type','school','month','week','level','title','note'].forEach(id=>{let v=q.get(id);if(v&&document.getElementById(id))document.getElementById(id).value=v});document.querySelectorAll('.report-control').forEach(el=>el.addEventListener('change',()=>{}))}
function remoteSchool(row){let d=row.full_data||{},sid=String(d.school_id||d.school_code||row.school_code||'');if(schoolBy(sid))return sid;let nm=String(d.school_name||row.school_name||'');let f=SCHOOLS.find(s=>nm.includes(s.short)||nm.includes(s.name));return f?.id||''}
async function loadRemote(){try{let c=window.alfalahSupabase||window.supabaseClient;if(!c)return;let ev=await c.from('library_evaluations').select('*').order('created_at',{ascending:false});if(!ev.error&&ev.data){REMOTE_EVAL=[];ev.data.forEach(row=>{let sid=remoteSchool(row),s=schoolBy(sid);if(!s)return;let d=row.full_data||{};let sc=Number(row.total_score||d.total_score||evalAvg(d)||0);let date=d.date||row.visit_date||row.created_at||'';REMOTE_EVAL.push({school:s,library:d.lib||d.librarian||'المكتبة الرئيسية',kind:'رئيسية',score:sc,staff:staffScore(d,null),date,month:monthFromDate(date),raw:d});(Array.isArray(d.libraries)?d.libraries:[]).forEach((l,i)=>REMOTE_EVAL.push({school:s,library:l.type||('مكتبة إضافية '+(i+1)),kind:'إضافية',score:RM[l.rating]||booksToScore(l.books)||0,staff:staffScore(d,l),date,month:monthFromDate(date),raw:l}))})}let wk=await c.from('daily_work_logs').select('*').order('created_at',{ascending:false}).limit(300);if(!wk.error&&wk.data){REMOTE_WEEK=normWeeks(wk.data.map(row=>{let d=row.full_data||{};let days=['mon','tue','wed','thu','fri'].map((day,j)=>({day:['الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'][j],type:d['atype'+j]||row.task_type||'',loc:d['dloc'+j]||'',task:d['dtasks'+j]||row.task_details||'',note:d['anote'+j]||row.notes||'',in:d['ain'+j]||'',out:d['aout'+j]||''}));let from=d.from||d.dateFrom||row.work_date||row.created_at||'';return {week:String(d.wnum||row.week_number||''),from,to:d.to||d.dateTo||row.work_date||'',status:d.wstatus||d.status||'',month:monthFromDate(from),days,visits:days.filter(x=>/زيارة|مدرسة|ميدانية/.test((x.type+' '+x.loc+' '+x.task))).length,tasks:days.filter(x=>(x.task||x.type||x.note||'').trim()).length,attendance:days.filter(x=>x.in||x.out||/دوام/.test(x.type)).length}}))}}catch(e){console.warn(e)}}
document.addEventListener('DOMContentLoaded',async()=>{initControls();await loadRemote();render()});
