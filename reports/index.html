<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التقارير والمقارنة</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="../assets/css/style.css"></head><body><script src="../assets/js/supabaseClient.js"></script><script src="../assets/js/common.js"></script><script>pageHeader('المقارنة والتقارير النهائية')</script>
<div class="card"><h2>ملخص التقييمات</h2><div id="msg" class="msg">جاري جلب البيانات...</div><div id="table"></div></div>
<script>
(async()=>{const {data,error}=await sb.from('library_evaluations').select('*,schools(name,city)').order('total_score',{ascending:false}); if(error){showMsg('msg',error.message,'bad');return} showMsg('msg','تم جلب البيانات.','ok'); if(!data?.length){document.getElementById('table').innerHTML='<div class="msg">لا توجد تقييمات محفوظة.</div>';return} document.getElementById('table').innerHTML='<table><tr><th>المدرسة</th><th>المدينة</th><th>التاريخ</th><th>النتيجة</th><th>التوصيات</th></tr>'+data.map(r=>`<tr><td>${r.schools?.name||r.school_code||''}</td><td>${r.schools?.city||''}</td><td>${r.visit_date||''}</td><td>${r.total_score||''}</td><td>${(r.recommendations||'').slice(0,80)}</td></tr>`).join('')+'</table>'})();
</script><script>pageFooter()</script></body></html>
