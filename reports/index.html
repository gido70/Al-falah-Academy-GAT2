<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>المقارنة والتقارير النهائية</title><link rel="stylesheet" href="../assets/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js"></script><script src="../assets/app.js"></script></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>المقارنة والتقارير النهائية</h1><p>قراءة مباشرة من Supabase دون ظهور أكواد على الشاشة</p></section><div class="nav"><button class="btn primary" onclick="loadReport()">🔄 تحديث التقرير</button><button class="btn gold" onclick="window.print()">🖨️ طباعة</button><button class="btn teal" onclick="exportCSV()">CSV تصدير</button></div><div id="report"></div></div><script>
let rows=[];async function loadReport(){const sb=SB();const {data,error}=await sb.from('library_evaluations').select('*').order('created_at',{ascending:false});if(error){q('report').innerHTML='<div class="msg err">'+error.message+'</div>';return}rows=(data||[]).map(r=>{const s=schoolById(r.school_id)||schoolByCode(r.school_code)||{};return {...r,school_name:s.name||r.full_data?.school_name||'—',city:s.city||'—'}});render()}
function render(){if(!rows.length){q('report').innerHTML='<div class="card"><h2>لا توجد تقييمات محفوظة بعد</h2></div>';return}const latest={};rows.forEach(r=>{if(!latest[r.school_id])latest[r.school_id]=r});const arr=Object.values(latest).sort((a,b)=>(b.total_score||0)-(a.total_score||0));const avg=Math.round(arr.reduce((s,r)=>s+Number(r.total_score||0),0)/arr.length*10)/10;q('report').innerHTML=`<div class="kpis"><div class="kpi"><strong>${arr.length}</strong><span>مدارس مقيمة</span></div><div class="kpi"><strong>${avg}</strong><span>المتوسط العام</span></div><div class="kpi"><strong>${arr[0].school_name}</strong><span>الأعلى</span></div><div class="kpi"><strong>${arr[arr.length-1].school_name}</strong><span>الأقل</span></div></div><div class="card"><h2>ترتيب المدارس</h2><table><tr><th>#</th><th>المدرسة</th><th>المدينة</th><th>المتوسط</th><th>المستوى</th><th>آخر حفظ</th></tr>${arr.map((r,i)=>`<tr><td>${i+1}</td><td>${r.school_name}</td><td>${r.city}</td><td>${r.total_score||'—'}</td><td>${r.final_level||'—'}</td><td>${(r.created_at||'').slice(0,10)}</td></tr>`).join('')}</table></div><div class="grid">${arr.map(r=>`<div class="card"><h3>${r.school_name}</h3><div class="bar"><div class="fill" style="width:${Math.round((Number(r.total_score||0)/6)*100)}%"></div></div><p><b>${r.total_score||0}</b> من 6</p><p>${r.recommendations||'لا توجد توصيات مدخلة.'}</p></div>`).join('')}</div>`}
function exportCSV(){if(!rows.length)return;csvDownload('alfalah_reports.csv',[['المدرسة','المدينة','المتوسط','المستوى','التاريخ'],...rows.map(r=>[r.school_name,r.city,r.total_score,r.final_level,(r.created_at||'').slice(0,10)])])}
document.addEventListener('DOMContentLoaded',loadReport)
</script></body></html>
