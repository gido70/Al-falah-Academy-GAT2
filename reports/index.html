<!doctype html><html lang="ar" dir="rtl"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>المقارنة النهائية — أكاديمية الفلاح</title><style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--navy:#0c447c;--blue:#185fa5;--teal:#0f9d8a;--gold:#ba7517;--amber:#f0a500;--bg:#e8f0fa;--text:#0c2a4a;--muted:#5a7fa8;--border:#b8d4f0;--green:#0f6e56;--red:#c0392b;--grad:linear-gradient(160deg,#0c447c,#185fa5,#0f6e56)}
*{box-sizing:border-box}body{margin:0;font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#e8f0fa,#f7fbff);color:var(--text);direction:rtl}.wrap{max-width:1180px;margin:auto;padding:16px}.hero{background:var(--grad);border-radius:24px;padding:28px 24px;color:white;text-align:center;box-shadow:0 14px 36px rgba(12,68,124,.25);overflow:hidden;position:relative}.hero:before{content:'';position:absolute;inset:auto -60px -80px auto;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.07)}.logo{display:block;max-width:260px;width:70%;margin:0 auto 14px;background:rgba(255,255,255,.96);padding:12px 20px;border-radius:18px}.hero h1{margin:0;font-size:28px;font-weight:900}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86)}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px}.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:14px;text-decoration:none;border:0;font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer}.primary{background:white;color:var(--navy)}.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:white}.teal{background:linear-gradient(135deg,var(--green),var(--teal));color:white}.outline{background:#fff;border:2px solid var(--border);color:var(--navy)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}.card{background:white;border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:0 4px 18px rgba(12,68,124,.08)}.card h2,.card h3{margin:0 0 8px;color:var(--navy);font-weight:900}.muted{color:var(--muted);font-size:14px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.kpi{text-align:center;background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px}.kpi strong{font-size:30px;color:var(--navy);display:block}.school-card{border-right:6px solid var(--gold)}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th{background:var(--navy);color:#fff;padding:10px;font-size:13px}td{border-bottom:1px solid #e8eef5;padding:10px;text-align:center;font-size:13px}td:first-child,th:first-child{text-align:right}.tag{display:inline-block;padding:4px 10px;border-radius:999px;background:#e6f1fb;color:var(--navy);font-size:12px;font-weight:800}.bar{height:12px;background:#e8eef5;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal),var(--gold));border-radius:999px}.note{border-right:5px solid var(--gold);background:#fff8e6;border-radius:14px;padding:14px;line-height:1.9}.footer{text-align:center;color:var(--muted);font-size:12px;margin:28px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}@media(max-width:850px){.grid,.kpis{grid-template-columns:1fr}.hero h1{font-size:22px}.wrap{padding:10px}.logo{max-width:210px}.card{padding:14px}}
</style></head><body>
<a class="home-return-btn" href="../index.html" aria-label="الرجوع للصفحة الرئيسية">🏠 الرئيسية</a><style>.home-return-btn{position:fixed;top:14px;right:14px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:999px;background:linear-gradient(135deg,#0c447c,#185fa5,#0f9d8a);color:#fff!important;text-decoration:none;font-family:Cairo,Tahoma,Arial,sans-serif;font-weight:900;font-size:13px;box-shadow:0 6px 18px rgba(12,68,124,.28);border:1px solid rgba(255,255,255,.45)}.home-return-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(12,68,124,.36)}@media(max-width:700px){.home-return-btn{top:auto;bottom:16px;right:16px;padding:10px 16px;font-size:13px}}@media print{.home-return-btn{display:none!important}}</style><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png" alt="شعار أكاديمية الفلاح"><h1>المقارنة النهائية والتقرير الشامل</h1><p>ترتيب المدارس، متوسط المحاور، نقاط القوة والضعف، وتوصية نهائية بعد اكتمال التقييمات.</p><div class="nav"><a class="btn primary" href="../index.html">🏠 الرئيسية</a><a class="btn primary" href="../evaluation/index.html">📋 التقييمات</a><a class="btn primary" href="../schedule/index.html">🕘 جدول المهمة</a><button class="btn gold" onclick="window.print()">🖨️ طباعة التقرير</button></div></section><div id="report"></div><div class="footer">أكاديمية الفلاح — التقرير المقارن لمكتبات 2026</div></div><script>const SCHOOLS=[{"id": "khb", "name": "أكاديمية الفلاح فرع الخبيصي", "short": "الخبيصي", "city": "العين", "day": "الثلاثاء", "date": "2026-04-28"}, {"id": "jmi", "name": "أكاديمية الفلاح فرع الجيمي", "short": "الجيمي", "city": "العين", "day": "الأربعاء", "date": "2026-04-29"}, {"id": "shj", "name": "مدرسة الفلاح الخاصة - الدخيلات", "short": "الشارقة", "city": "الشارقة", "day": "الثلاثاء", "date": "2026-05-05"}, {"id": "bny", "name": "أكاديمية الفلاح فرع بني ياس", "short": "بني ياس", "city": "أبوظبي", "day": "الخميس", "date": "2026-05-07"}, {"id": "mzd", "name": "أكاديمية الفلاح فرع محمد بن زايد", "short": "محمد بن زايد", "city": "أبوظبي", "day": "الاثنين", "date": "2026-05-11"}, {"id": "dan", "name": "أكاديمية الفلاح فرع الدانة", "short": "الدانة", "city": "أبوظبي", "day": "الثلاثاء", "date": "2026-05-12"}];const LSK="falah_lib_v6";const LABELS={r_uae:'مجموعات الإمارات',r_cd:'تنوع المجموعات',r_cc:'حداثة المجموعات',r_cco:'توافق المحتوى مع المنهاج',r_sh:'تنظيم الأرفف',r_cr:'سجلات الإعارة',r_sp:'جاهزية المكان',r_se:'أماكن القراءة',r_at:'البيئة الجاذبة',r_in:'الإرشادات',r_rch:'تحدي القراءة',r_tu:'استخدام المعلمين',r_cu:'ربط المكتبة بالمنهاج',r_ri:'المبادرات القرائية',r_pa:'الشراكات والأنشطة',r_co:'التعاون',r_ts:'الدعم الفني',r_ss:'الأمن والسلامة',r_sb:'المبنى والمرافق',r_sc:'التجهيزات',r_sst:'التخزين',r_si:'الإضاءة والتهوية',r_ste:'التقنية',r_dg:'المصادر الرقمية',r_te:'التقنيات التعليمية',r_un:'الاستخدام الرقمي'};function loadDB(){try{return JSON.parse(localStorage.getItem(LSK)||'{"ev":{}}')}catch(e){return {ev:{}}}}function pct(v){return Math.round((Number(v||0)/6)*100)}function level(avg){if(avg>=5)return 'متميزة'; if(avg>=4)return 'جيدة جداً'; if(avg>=3)return 'مقبولة تحتاج تحسين'; if(avg>0)return 'تحتاج تدخل عاجل'; return 'غير مكتملة'}function scoreList(d){return Object.keys(LABELS).map(k=>[k,LABELS[k],Number(d?.[k]||0)]).filter(x=>x[2]>0)}function avg(d){const a=scoreList(d).map(x=>x[2]); return a.length?Math.round((a.reduce((s,x)=>s+x,0)/a.length)*10)/10:0}function strengths(d){return scoreList(d).filter(x=>x[2]>=5).map(x=>x[1])}function weaknesses(d){return scoreList(d).filter(x=>x[2]>0&&x[2]<=3).map(x=>x[1])}
const db=loadDB();const rows=SCHOOLS.map(s=>{const d=db.ev?.[s.id];return {s,d,av:d?.saved?avg(d):0,done:!!d?.saved}});const done=rows.filter(r=>r.done);const rep=document.getElementById('report');function esc(x){return x||'—'}if(!done.length){rep.innerHTML='<div class="card"><h2>لا توجد تقييمات محفوظة بعد</h2><p class="muted">ابدأ بحفظ تقييم مدرسة واحدة على الأقل من نظام التقييم.</p></div>'}else{const overall=Math.round(done.reduce((a,r)=>a+r.av,0)/done.length*10)/10;const best=[...done].sort((a,b)=>b.av-a.av)[0];const weakest=[...done].sort((a,b)=>a.av-b.av)[0];rep.innerHTML=`<div class="kpis"><div class="kpi"><strong>${done.length} / 6</strong><span>تقييمات مكتملة</span></div><div class="kpi"><strong>${overall}</strong><span>المتوسط العام</span></div><div class="kpi"><strong>${best.s.short}</strong><span>الأعلى تقييماً</span></div><div class="kpi"><strong>${weakest.s.short}</strong><span>الأكثر احتياجاً للتحسين</span></div></div><div class="card"><h2>ملخص إداري</h2><div class="note">بلغ المتوسط العام للمدارس المحفوظة ${overall} من 6. أفضل نتيجة حالياً في ${best.s.name}، بينما تحتاج ${weakest.s.name} إلى متابعة أوضح في خطة التحسين. هذا التقرير يعتمد على البيانات المحفوظة في هذا المتصفح، ويمكن نقله عبر تصدير JSON من نظام التقييم.</div></div><div class="card"><h2>ترتيب المدارس</h2><table><thead><tr><th>#</th><th>المدرسة</th><th>المدينة</th><th>المتوسط</th><th>المستوى</th><th>فتح الملف</th></tr></thead><tbody>${[...done].sort((a,b)=>b.av-a.av).map((r,i)=>`<tr><td>${i+1}</td><td>${r.s.name}</td><td>${r.s.city}</td><td>${r.av}</td><td><span class="tag">${level(r.av)}</span></td><td><a class="btn outline" href="../schools/${r.s.id}/index.html">فتح</a></td></tr>`).join('')}</tbody></table></div><div class="grid">${done.map(r=>`<div class="card school-card"><h3>${r.s.short}</h3><div class="muted">${r.s.city}</div><div class="bar" style="margin:12px 0"><div class="fill" style="width:${pct(r.av)}%"></div></div><b>${r.av} من 6 — ${level(r.av)}</b></div>`).join('')}</div>`}</script><script src="../assets/db-sync.js?v=20260502"></script></body></html>
