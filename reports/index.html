*{box-sizing:border-box}body{margin:0;font-family:Cairo,Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#e8f0fa,#f7fbff);color:var(--text);direction:rtl;line-height:1.7}.wrap{max-width:1180px;margin:auto;padding:16px 14px 70px}.hero{background:var(--grad);border-radius:26px;padding:30px 20px;text-align:center;color:white;box-shadow:0 14px 36px rgba(12,68,124,.24);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:auto -90px -110px auto;width:330px;height:330px;border-radius:50%;background:rgba(255,255,255,.07)}.hero>*{position:relative;z-index:1}.logo{display:block;max-width:230px;width:65%;margin:0 auto 14px;background:#fff;padding:12px 20px;border-radius:18px}.hero h1{margin:0;font-size:30px;font-weight:900}.hero p{margin:8px 0 0;color:rgba(255,255,255,.88)}.home{position:fixed;top:14px;right:14px;z-index:20;background:var(--grad);color:#fff!important;text-decoration:none!important;padding:10px 16px;border-radius:999px;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.2)}.director-mode .home{display:none!important}.director-mode .wrap{max-width:900px}.director-mode .hero{border-radius:22px;padding:24px 16px}.director-mode .hero h1{font-size:25px}.director-mode .only-normal{display:none!important}.director-mode .director-hide{display:none!important}.topbar{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,#0c447c,#0f9d8a);padding:10px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;box-shadow:0 3px 14px rgba(12,68,124,.18)}.btn{border:0;border-radius:14px;padding:11px 18px;font-family:Cairo,Tahoma,Arial,sans-serif;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.16s}.btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.13)}.primary{background:#fff;color:var(--navy)}.teal{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff}.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:#fff}.purple{background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff}.outline{background:#fff;border:2px solid var(--border);color:var(--navy)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:#fff;border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 4px 18px rgba(12,68,124,.08);margin:16px 0}.card h2,.card h3{margin:0 0 12px;color:var(--navy);font-weight:900}.muted{color:var(--muted);font-size:14px}.filters{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.filters.two{grid-template-columns:repeat(2,1fr)}label{display:block;font-weight:900;color:var(--navy);margin-bottom:6px}select,input,textarea{width:100%;border:2px solid var(--border);border-radius:13px;padding:11px 12px;font-family:Cairo,Tahoma,Arial,sans-serif;font-size:14px;background:#f8fbff;color:var(--text);outline:none}select:focus,input:focus,textarea:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(24,95,165,.12)}textarea{min-height:110px;resize:vertical}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}.url{direction:ltr;text-align:left;background:#f8fbff;border:2px solid var(--border);border-radius:14px;padding:12px;word-break:break-all;color:var(--navy);font-size:13px;min-height:64px}.note{border-right:5px solid var(--gold);background:#fff8e6;border-radius:14px;padding:14px;line-height:1.9}.smart{border-right:6px solid var(--teal);background:linear-gradient(135deg,#f0faf6,#e8f8f0);border-radius:16px;padding:16px;line-height:2}.warn{border-right:6px solid var(--red);background:#fff5f5;border-radius:16px;padding:16px;line-height:2}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{background:#fff;border:1px solid var(--border);border-radius:18px;padding:16px;text-align:center;box-shadow:0 3px 12px rgba(12,68,124,.06)}.kpi strong{display:block;font-size:31px;color:var(--navy);line-height:1.2}.kpi span{font-weight:800;color:var(--muted);font-size:13px}.bar{height:12px;background:#e9f1fb;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal),var(--gold));border-radius:999px}.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-weight:900;font-size:12px;background:#e6f1fb;color:var(--navy)}.pill.ok{background:#e1f5ee;color:#085041}.pill.warn{background:#faeeda;color:#633806}.pill.bad{background:#fcebeb;color:#791f1f}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th{background:var(--navy);color:#fff;padding:10px;font-size:13px;text-align:center}td{border-bottom:1px solid #e8eef5;padding:10px;text-align:center;font-size:13px}td:first-child,th:first-child{text-align:right}.mini-list{display:grid;gap:10px}.mini{background:#f8fbff;border:1px solid var(--border);border-radius:14px;padding:12px}.mini b{color:var(--navy)}.feedback-form{background:linear-gradient(135deg,#f8fbff,#eef8f5);border:2px solid var(--teal);border-radius:22px;padding:18px;margin:20px 0}.footer{text-align:center;color:var(--muted);font-size:12px;margin:24px 0}.feedback-list{display:grid;gap:10px}.fb{background:#f8fbff;border:1px solid var(--border);border-radius:14px;padding:12px}.fb p{margin:8px 0 0}.print-only{display:none}
.chartbox{min-height:300px}.chartbox canvas{width:100%!important;height:280px!important}.director-mode .chartbox{min-height:240px}.director-mode .chartbox canvas{height:230px!important}.visual-note{background:#f8fbff;border:1px solid var(--border);border-radius:14px;padding:12px;margin-top:10px;color:var(--muted);font-size:13px}@media(max-width:900px){.chartbox{min-height:250px}.chartbox canvas{height:240px!important}}

</style></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="topbar no-print"><button class="btn primary" onclick="printPage()">🖨️ طباعة / PDF</button><button class="btn primary" onclick="copyReportText()">📋 نسخ نص التقرير</button><button class="btn gold only-normal" onclick="copyDirectorLink()">🔗 نسخ رابط المدير</button><button class="btn teal only-normal" onclick="openDirector()">👁️ معاينة رابط المدير</button><button class="btn outline only-normal" onclick="gmailDirector()">Gmail</button><button class="btn teal only-normal" onclick="whatsappDirector()">واتساب</button></div><div class="wrap"><section class="card only-normal filters-card"><h2>خيارات التقرير</h2><div class="filters"><div><label>نوع التقرير</label><select id="type" class="report-control"><option value="all">تقرير شامل</option><option value="weekly">تقرير أسبوعي</option><option value="monthly">تقرير شهري</option><option value="eval">تقييم المكتبات</option><option value="work">الدوام والزيارات</option><option value="special">موضوع خاص</option></select></div><div><label>المدرسة</label><select id="school" class="report-control"><option value="all">كل المدارس</option><option value="khb">الخبيصي</option><option value="jmi">الجيمي</option><option value="shj">الشارقة</option><option value="bny">بني ياس</option><option value="mzd">محمد بن زايد</option><option value="dan">الدانة</option></select></div><div><label>الشهر</label><select id="month" class="report-control"><option value="all">كل الشهور</option><option value="04">أبريل</option><option value="05">مايو</option><option value="06">يونيو</option><option value="07">يوليو</option><option value="08">أغسطس</option><option value="09">سبتمبر</option><option value="10">أكتوبر</option><option value="11">نوفمبر</option><option value="12">ديسمبر</option></select></div><div><label>الأسبوع</label><select id="week" class="report-control"><option value="all">كل الأسابيع</option></select></div><div><label>مستوى العرض</label><select id="level" class="report-control"><option value="brief">مختصر للمدير</option><option value="detail">تفصيلي</option></select></div></div><div class="grid" style="margin-top:12px"><div><label>عنوان خاص اختياري</label><input id="title" class="report-control" placeholder="مثال: تقرير متابعة مكتبة الحلقة الأولى"></div><div><label>ملاحظات أو توجيه خاص</label><input id="note" class="report-control" placeholder="مثال: ركز على مدرسة الجيمي فقط"></div></div><div class="actions"><button class="btn teal" onclick="updateURL()">🔄 توليد التقرير حسب الاختيارات</button><button class="btn gold" onclick="copyDirectorLink()">📋 نسخ رابط المدير</button><button class="btn outline" onclick="gmailDirector()">Gmail</button><button class="btn teal" onclick="whatsappDirector()">واتساب</button></div></section><main id="reportRoot"></main></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=20260510f"></script>
<script src="../supabase-config.js?v=20260510c"></script><script>const logoSrc='../assets/logo.png';
let CHARTS=[];
const SCHOOLS=[
 {id:'khb',short:'الخبيصي',name:'أكاديمية الفلاح فرع الخبيصي',city:'العين'},
 {id:'jmi',short:'الجيمي',name:'أكاديمية الفلاح فرع الجيمي',city:'العين'},
 {id:'shj',short:'الشارقة',name:'مدرسة الفلاح الخاصة - الدخيلات',city:'الشارقة'},
 {id:'bny',short:'بني ياس',name:'أكاديمية الفلاح فرع بني ياس',city:'أبوظبي'},
 {id:'mzd',short:'محمد بن زايد',name:'أكاديمية الفلاح فرع محمد بن زايد',city:'أبوظبي'},
 {id:'dan',short:'الدانة',name:'أكاديمية الفلاح فرع الدانة',city:'أبوظبي'}
];
const LABELS={r_uae:'المجموعات والمصادر',r_cd:'تنوع المجموعات',r_cc:'حداثة المجموعات',r_sh:'تنظيم الأرفف',r_cr:'الإعارة والسجلات',r_sp:'جاهزية المكان',r_se:'أماكن القراءة',r_at:'البيئة الجاذبة',r_in:'الإرشادات',r_rch:'تحدي القراءة',r_tu:'استخدام المعلمين',r_cu:'ربط المنهاج',r_ri:'المبادرات',r_pa:'الشراكات',r_ts:'الدعم الفني',r_ss:'الأمن والسلامة',r_sb:'المبنى والمرافق',r_sc:'التجهيزات',r_dg:'المصادر الرقمية',r_te:'التقنية'};
const RM={'ضعيف':2,'مقبول':3.5,'جيد':4,'جيدة':4,'جيد جداً':5,'جيدة جداً':5,'متميز':6,'ممتاز':6};
const q=new URLSearchParams(location.search);const director=q.get('director')==='1';document.body.classList.toggle('director-mode',director);
function esc(x){return String(x??'—').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}
function load(k,def){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(def))}catch(e){return def}}
function monthName(m){return ({'04':'أبريل','05':'مايو','06':'يونيو','07':'يوليو','08':'أغسطس','09':'سبتمبر','10':'أكتوبر','11':'نوفمبر','12':'ديسمبر'})[m]||'كل الشهور'}
function level(v){v=Number(v||0);if(v>=5)return'متميزة';if(v>=4)return'جيدة جداً';if(v>=3)return'مقبولة';if(v>0)return'تحتاج تحسين';return'غير مكتملة'}
function tag(v){v=Number(v||0);return v>=4?'ok':(v>0&&v<3?'bad':'warn')}
function schoolBy(id){return SCHOOLS.find(s=>s.id===id)||null}
function scoreVals(d){return Object.keys(LABELS).map(k=>Number(d?.[k]||0)).filter(v=>v>0)}
function avg(vals){vals=vals.map(Number).filter(v=>!isNaN(v));return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0}
function evalAvg(d){return avg(scoreVals(d))}
function monthFromDate(d){return String(d||'').match(/-(\d{2})-/)?.[1]||'all'}
function booksToScore(x){let n=parseInt(String(x||'').replace(/[^0-9]/g,''),10)||0;if(n>=3000)return 6;if(n>=1500)return 5;if(n>=500)return 4;if(n>0)return 3;return 0}
function staffScore(d,l){let raw=(l&&l.staff)||(l&&l.specialist)||d?.staff||d?.librarian||'';return raw?100:0}
function getEvalRows(){const db=load('falah_lib_v6',{ev:{}});let out=[];SCHOOLS.forEach(s=>{const d=db.ev?.[s.id];if(!d||!d.saved)return;let sc=evalAvg(d);out.push({school:s,library:d.lib||d.librarian||'المكتبة الرئيسية',kind:'رئيسية',score:sc,staff:staffScore(d,null),date:d.date||'',raw:d});(Array.isArray(d.libraries)?d.libraries:[]).forEach((l,i)=>{let sc2=RM[l.rating]||booksToScore(l.books)||0;out.push({school:s,library:l.type||('مكتبة إضافية '+(i+1)),kind:'إضافية',score:sc2,staff:staffScore(d,l),date:d.date||'',raw:l})})});return out}
function getWeekRows(){let rows=[];for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i);if(k==='falah_wp_final'||k.startsWith('falah_week_')){let d=load(k,null);if(!d)continue;let sig=JSON.stringify(d);if(rows.some(r=>r.sig===sig))continue;let days=['mon','tue','wed','thu','fri'].map((day,j)=>({type:d['atype'+j]||'',loc:d['dloc'+j]||'',task:d['dtasks'+j]||'',note:d['anote'+j]||'',in:d['ain'+j]||'',out:d['aout'+j]||''}));let visits=days.filter(x=>/زيارة|مدرسة|ميدانية/.test((x.type+' '+x.loc+' '+x.task))).length;let tasks=days.filter(x=>(x.task||'').trim()).length;rows.push({sig,key:k,week:String(d.wnum||k.replace('falah_week_','')),from:d.from||d.dateFrom||'',to:d.to||d.dateTo||'',status:d.wstatus||d.status||'',month:monthFromDate(d.from||d.dateFrom||''),days,visits,tasks})}}return rows.sort((a,b)=>String(a.from).localeCompare(String(b.from)))}
function selected(){return {type:q.get('type')||document.getElementById('type')?.value||'all',school:q.get('school')||document.getElementById('school')?.value||'all',month:q.get('month')||document.getElementById('month')?.value||'all',week:q.get('week')||document.getElementById('week')?.value||'all',level:q.get('level')||document.getElementById('level')?.value||'brief',title:q.get('title')||document.getElementById('title')?.value||'',note:q.get('note')||document.getElementById('note')?.value||''}}
function filteredData(sel){let er=getEvalRows(), wr=getWeekRows();if(sel.school!=='all')er=er.filter(r=>r.school.id===sel.school);if(sel.month!=='all'){er=er.filter(r=>monthFromDate(r.date)===sel.month||!r.date);wr=wr.filter(w=>w.month===sel.month)}if(sel.week!=='all')wr=wr.filter(w=>w.week===sel.week);return {er,wr}}
function summary(sel,er,wr){let doneSchools=[...new Set(er.map(r=>r.school.id))].length;let libs=er.length;let scores=er.map(r=>r.score).filter(Boolean);let average=avg(scores);let best=er.slice().sort((a,b)=>b.score-a.score)[0];let worst=er.filter(r=>r.score>0).slice().sort((a,b)=>a.score-b.score)[0];let title=sel.title||({all:'تقرير شامل',weekly:'تقرير أسبوعي',monthly:'تقرير شهري',eval:'تقييم المكتبات',work:'الدوام والزيارات',special:'موضوع خاص'})[sel.type]||'تقرير';let scope=sel.school==='all'?'كل المدارس':(schoolBy(sel.school)?.short||'مدرسة محددة');let period=sel.week!=='all'?'الأسبوع '+sel.week:(sel.month!=='all'?monthName(sel.month):'كل الفترات');return {doneSchools,libs,average,best,worst,title,scope,period,weeks:wr.length,visits:wr.reduce((s,w)=>s+w.visits,0),tasks:wr.reduce((s,w)=>s+w.tasks,0)}}
function kpisHTML(sum,sel){if(sel.type==='special')return '';return `<section class="kpis"><div class="kpi"><strong>${sum.doneSchools}</strong><span>مدارس ضمن التقرير</span></div><div class="kpi"><strong>${sum.libs}</strong><span>مكتبات داخلة في التقرير</span></div><div class="kpi"><strong>${sum.average||0}</strong><span>متوسط التقييم من 6</span></div><div class="kpi"><strong>${sum.weeks}</strong><span>أسابيع عمل</span></div></section>`}
function evalSection(er,sel){if(!['all','eval','monthly'].includes(sel.type) && !(sel.school!=='all'&&sel.type!=='work'))return '';if(!er.length)return '<section class="card"><h2>نتائج التقييم</h2><div class="note">لا توجد تقييمات محفوظة ضمن الاختيار الحالي.</div></section>';let rows=er.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.school.short)}</td><td>${esc(r.library)}</td><td>${r.kind}</td><td><b>${r.score||0}</b> / 6 <div class="bar"><div class="fill" style="width:${Math.round((r.score||0)/6*100)}%"></div></div></td><td>${r.staff||0}%</td><td><span class="pill ${tag(r.score)}">${level(r.score)}</span></td></tr>`).join('');return `<section class="card"><h2>📚 نتائج تقييم المكتبات</h2><table><thead><tr><th>#</th><th>المدرسة</th><th>المكتبة</th><th>النوع</th><th>التقييم</th><th>الكادر المهني</th><th>المستوى</th></tr></thead><tbody>${rows}</tbody></table></section>`}
function workSection(wr,sel){if(!['all','work','weekly','monthly'].includes(sel.type))return '';if(!wr.length)return '<section class="card"><h2>سجل الدوام والزيارات</h2><div class="note">لا توجد أسابيع عمل ضمن الاختيار الحالي.</div></section>';let rows=wr.map(w=>`<div class="mini"><b>الأسبوع ${esc(w.week)}</b> — ${esc(w.from)} إلى ${esc(w.to)}<br><span class="muted">الحالة: ${esc(w.status)} — الزيارات: ${w.visits} — المهام: ${w.tasks}</span></div>`).join('');return `<section class="card"><h2>🗓️ سجل الدوام والزيارات</h2><div class="mini-list">${rows}</div></section>`}
function chartsSection(er,wr,sel){
  if(sel.type==='special')return '';
  const showEval = ['all','eval','monthly'].includes(sel.type) || (sel.school!=='all' && sel.type!=='work');
  const showWork = ['all','work','weekly','monthly'].includes(sel.type);
  let html='';
  if(showEval && er.length){
    html += `<section class="grid"><div class="card chartbox"><h2>📊 ترتيب المدارس والمكتبات</h2><canvas id="schoolChart"></canvas><div class="visual-note">يعرض متوسط المدرسة أو المكتبة حسب الاختيار الحالي فقط.</div></div><div class="card chartbox"><h2>🍩 الخلاصة العامة بالنسب</h2><canvas id="summaryChart"></canvas><div class="visual-note">الأداء العام، الكادر المهني، والفجوة التحسينية المتبقية.</div></div></section>`;
  }
  if(showWork && wr.length){
    html += `<section class="card chartbox"><h2>🗓️ رسم بياني للدوام والزيارات والمهام</h2><canvas id="workChart"></canvas><div class="visual-note">يعرض الأسابيع أو الشهر المختار فقط حسب رابط التقرير.</div></section>`;
  }
  return html;
}
function drawCharts(er,wr,sel){
  if(typeof Chart==='undefined')return;
  CHARTS.forEach(c=>{try{c.destroy()}catch(e){}}); CHARTS=[];
  const showEval = ['all','eval','monthly'].includes(sel.type) || (sel.school!=='all' && sel.type!=='work');
  const showWork = ['all','work','weekly','monthly'].includes(sel.type);
  if(showEval && er.length && document.getElementById('schoolChart')){
    let grouped={};
    er.forEach(r=>{const key= sel.school==='all' ? r.school.short : (r.library||r.school.short); (grouped[key]??=[]).push(Number(r.score)||0);});
    let data=Object.entries(grouped).map(([k,v])=>[k,avg(v)]).sort((a,b)=>b[1]-a[1]);
    CHARTS.push(new Chart(document.getElementById('schoolChart'),{
      type:'bar',
      data:{labels:data.map(x=>x[0]),datasets:[{label:'متوسط التقييم من 6',data:data.map(x=>x[1])}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{min:0,max:6,ticks:{stepSize:1}}},plugins:{legend:{display:false}}}
    }));
  }
  if(showEval && er.length && document.getElementById('summaryChart')){
    let avgScore=avg(er.map(r=>r.score)); let staff=avg(er.map(r=>r.staff)); let gap=Math.max(0,100-Math.round((avgScore||0)/6*100));
    CHARTS.push(new Chart(document.getElementById('summaryChart'),{
      type:'doughnut',

      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true}}}
    }));
  }
}

/* === Supabase live data loader for final reports === */
window.REPORT_REMOTE_READY=false;
window.REMOTE_EVAL_ROWS=[];
window.REMOTE_WEEK_ROWS=[];
function _safeObj(x){return x&&typeof x==='object'?x:{};}
function _schoolIdFromRow(row){
  var d=_safeObj(row.full_data); var sid=String(d.school_id||d.school_code||row.school_code||'').trim();
  if(sid && schoolBy(sid)) return sid;
  var n=String(row.school_id||d.school_db_id||'');
  var map={1:'dan',2:'mzd',3:'bny',4:'khb',5:'jmi',6:'shj'};
  if(map[n]) return map[n];
  var nm=String(d.school_name||row.school_name||'');
  var f=SCHOOLS.find(function(s){return nm.indexOf(s.short)>=0 || nm.indexOf(s.name)>=0;});
  return f?f.id:'';
}
function _evalRowsFromRemote(rows){
  var out=[];
  (rows||[]).forEach(function(row){
    var sid=_schoolIdFromRow(row); var s=schoolBy(sid); if(!s) return;
    var d=_safeObj(row.full_data); d.saved=true;
    if(!d.date) d.date=row.visit_date||row.created_at||'';
    if(!d.lib) d.lib=row.librarian_name||'';
    if(!d.overall) d.overall=row.final_level||'';
    var sc=Number(row.total_score||d.total_score||evalAvg(d)||0);
    out.push({school:s,library:d.lib||d.librarian||'المكتبة الرئيسية',kind:'رئيسية',score:sc,staff:staffScore(d,null),date:d.date||'',raw:d});
    (Array.isArray(d.libraries)?d.libraries:[]).forEach(function(l,i){
      var sc2=RM[l.rating]||booksToScore(l.books)||0;
      out.push({school:s,library:l.type||('مكتبة إضافية '+(i+1)),kind:'إضافية',score:sc2,staff:staffScore(d,l),date:d.date||'',raw:l});
    });
  });
  return out;
}
function _weekRowsFromRemote(rows){
  var out=[];
  (rows||[]).forEach(function(row){
    var d=_safeObj(row.full_data); if(!Object.keys(d).length) d={};
    var days=['mon','tue','wed','thu','fri'].map(function(day,j){return {type:d['atype'+j]||row.task_type||'',loc:d['dloc'+j]||'',task:d['dtasks'+j]||row.task_details||'',note:d['anote'+j]||row.notes||'',in:d['ain'+j]||'',out:d['aout'+j]||''};});
    var from=d.from||d.dateFrom||row.work_date||row.created_at||'';
    var visits=days.filter(function(x){return /زيارة|مدرسة|ميدانية/.test((x.type+' '+x.loc+' '+x.task));}).length;
    var tasks=days.filter(function(x){return (x.task||'').trim();}).length;
    out.push({sig:String(row.id||JSON.stringify(row)),key:String(row.id||''),week:String(d.wnum||row.week_number||row.id||''),from:from,to:d.to||d.dateTo||row.work_date||'',status:d.wstatus||d.status||'',month:monthFromDate(from),days:days,visits:visits,tasks:tasks});
  });
  return out.sort(function(a,b){return String(a.from).localeCompare(String(b.from));});
}
async function loadReportRemoteData(){
  try{
    var c=window.alfalahSupabase||window.supabaseClient;
    if(!c || typeof c.from!=='function'){window.REPORT_REMOTE_READY=true; return;}
    var ev=await c.from('library_evaluations').select('*').order('created_at',{ascending:false});
    if(!ev.error && ev.data) window.REMOTE_EVAL_ROWS=_evalRowsFromRemote(ev.data);
    var wk=await c.from('daily_work_logs').select('*').order('created_at',{ascending:false}).limit(200);
    if(!wk.error && wk.data) window.REMOTE_WEEK_ROWS=_weekRowsFromRemote(wk.data);
  }catch(e){console.warn('Remote report data unavailable',e)}
  window.REPORT_REMOTE_READY=true;
}
var _localGetEvalRows=getEvalRows, _localGetWeekRows=getWeekRows;
getEvalRows=function(){return (window.REMOTE_EVAL_ROWS&&window.REMOTE_EVAL_ROWS.length)?window.REMOTE_EVAL_ROWS:_localGetEvalRows();};
getWeekRows=function(){return (window.REMOTE_WEEK_ROWS&&window.REMOTE_WEEK_ROWS.length)?window.REMOTE_WEEK_ROWS:_localGetWeekRows();};

document.addEventListener('DOMContentLoaded',async()=>{await loadReportRemoteData();populateWeeks(q.get('week')||'all');render();document.querySelectorAll('.report-control').forEach(el=>el.addEventListener('change',updateURL));});
