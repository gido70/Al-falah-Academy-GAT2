<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>المقارنة والتقارير النهائية — أكاديمية الفلاح</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--navy:#0c447c;--blue:#185fa5;--teal:#0f9d8a;--gold:#ba7517;--amber:#f0a500;--bg:#e8f0fa;--text:#0c2a4a;--muted:#5a7fa8;--border:#b8d4f0;--green:#0f6e56;--red:#c0392b;--grad:linear-gradient(160deg,#0c447c,#185fa5,#0f6e56)}
*{box-sizing:border-box}body{margin:0;font-family:'Cairo',Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#e8f0fa,#f7fbff);color:var(--text);direction:rtl}.wrap{max-width:1180px;margin:auto;padding:16px 16px 90px}.hero{background:var(--grad);border-radius:24px;padding:28px 24px;color:white;text-align:center;box-shadow:0 14px 36px rgba(12,68,124,.25);position:relative;overflow:hidden}.hero:before{content:'';position:absolute;inset:auto -60px -80px auto;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.07)}.logo{display:block;max-width:260px;width:70%;margin:0 auto 14px;background:rgba(255,255,255,.96);padding:12px 20px;border-radius:18px}.hero h1{margin:0;font-size:28px;font-weight:900}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86)}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px}.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:14px;text-decoration:none;border:0;font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer}.primary{background:white;color:var(--navy)}.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:white}.teal{background:linear-gradient(135deg,var(--green),var(--teal));color:white}.outline{background:#fff;border:2px solid var(--border);color:var(--navy)}.card{background:white;border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:0 4px 18px rgba(12,68,124,.08);margin:18px 0}.card h2,.card h3{margin:0 0 10px;color:var(--navy);font-weight:900}.muted{color:var(--muted);font-size:14px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.kpi{text-align:center;background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px}.kpi strong{font-size:28px;color:var(--navy);display:block}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}.school-card{border-right:6px solid var(--gold)}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th{background:var(--navy);color:#fff;padding:10px;font-size:13px}td{border-bottom:1px solid #e8eef5;padding:10px;text-align:center;font-size:13px}td:first-child,th:first-child{text-align:right}.tag{display:inline-block;padding:4px 10px;border-radius:999px;background:#e6f1fb;color:var(--navy);font-size:12px;font-weight:800}.bar{height:12px;background:#e8eef5;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal),var(--gold));border-radius:999px}.note{border-right:5px solid var(--gold);background:#fff8e6;border-radius:14px;padding:14px;line-height:1.9}.footer{text-align:center;color:var(--muted);font-size:12px;margin:28px 0}.home-return-btn{position:fixed;top:14px;right:14px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:999px;background:linear-gradient(135deg,#0c447c,#185fa5,#0f9d8a);color:#fff!important;text-decoration:none;font-weight:900;font-size:13px;box-shadow:0 6px 18px rgba(12,68,124,.28);border:1px solid rgba(255,255,255,.45)}.error{background:#fff1f1;border-color:#f3b0b0;color:#7f1d1d}.ok{color:var(--green);font-weight:900}@media(max-width:850px){.grid,.kpis{grid-template-columns:1fr}.hero h1{font-size:22px}.wrap{padding:10px 10px 90px}.logo{max-width:210px}.card{padding:14px}.home-return-btn{top:auto;bottom:16px;right:16px}}@media print{.home-return-btn,.nav{display:none!important}.card{box-shadow:none;break-inside:avoid}.hero{box-shadow:none}}
</style>
</head>
<body>
<a class="home-return-btn" href="../index.html">🏠 الرئيسية</a>
<div class="wrap">
  <section class="hero">
    <img class="logo" src="../assets/logo.png" alt="شعار أكاديمية الفلاح">
    <h1>المقارنة النهائية والتقرير الشامل</h1>
    <p>ترتيب المدارس، متوسط المحاور، نقاط القوة والضعف، وتوصية نهائية.</p>
    <div class="nav">
      <a class="btn primary" href="../index.html">🏠 الرئيسية</a>
      <a class="btn primary" href="../evaluation/index.html">📋 التقييمات</a>
      <a class="btn primary" href="../schedule/index.html">🕘 جدول المهمة</a>
      <button class="btn gold" type="button" onclick="window.print()">🖨️ طباعة التقرير</button>
      <button class="btn teal" type="button" onclick="loadReport()">🔄 تحديث البيانات</button>
    </div>
  </section>
  <div id="status" class="card"><h2>جاري تحميل البيانات...</h2><p class="muted">يتم جلب التقييمات من Supabase.</p></div>
  <div id="report"></div>
  <div class="footer">أكاديمية الفلاح — التقرير المقارن لمكتبات 2026</div>
</div>
<script>
const SCHOOLS = [
  {id:1, code:'dan', name:'فرع الدانة', short:'الدانة', city:'أبوظبي'},
  {id:2, code:'mzd', name:'فرع محمد بن زايد', short:'محمد بن زايد', city:'أبوظبي'},
  {id:3, code:'bny', name:'فرع بني ياس', short:'بني ياس', city:'أبوظبي'},
  {id:4, code:'khb', name:'فرع الخبيصي', short:'الخبيصي', city:'العين'},
  {id:5, code:'jmi', name:'فرع الجيمي', short:'الجيمي', city:'العين'},
  {id:6, code:'shj', name:'مدرسة الفلاح الخاصة', short:'الشارقة', city:'الشارقة'}
];
const LABELS = {r_uae:'مجموعات الإمارات',r_cd:'تنوع المجموعات',r_cc:'حداثة المجموعات',r_cco:'توافق المحتوى مع المنهاج',r_sh:'تنظيم الأرفف',r_cr:'سجلات الإعارة',r_sp:'جاهزية المكان',r_se:'أماكن القراءة',r_at:'البيئة الجاذبة',r_in:'الإرشادات',r_rch:'تحدي القراءة',r_tu:'استخدام المعلمين',r_cu:'ربط المكتبة بالمنهاج',r_ri:'المبادرات القرائية'};
function el(tag, cls, text){const e=document.createElement(tag); if(cls)e.className=cls; if(text!==undefined)e.textContent=text; return e;}
function pct(v){return Math.max(0, Math.min(100, Math.round((Number(v||0)/6)*100)));}
function level(avg){if(avg>=5)return 'متميزة'; if(avg>=4)return 'جيدة جداً'; if(avg>=3)return 'مقبولة تحتاج تحسين'; if(avg>0)return 'تحتاج تدخل عاجل'; return 'غير مكتملة';}
function scoresFromFullData(d){const full=d && d.full_data ? d.full_data : {}; const arr=[]; Object.keys(LABELS).forEach(k=>{const v=Number(full[k] || full[k.replace('r_','')] || 0); if(v>0) arr.push([k,LABELS[k],v]);}); return arr;}
function avgFromRow(row){if(row.total_score) return Number(row.total_score); const arr=scoresFromFullData(row).map(x=>x[2]); if(!arr.length) return 0; return Math.round((arr.reduce((a,b)=>a+b,0)/arr.length)*10)/10;}
function clear(node){while(node.firstChild) node.removeChild(node.firstChild);}
function kpi(num,label){const d=el('div','kpi'); d.appendChild(el('strong','',String(num))); d.appendChild(el('span','',label)); return d;}
async function getEvaluations(){
  if(!window.alfalahSupabase){throw new Error('ملف supabase-config.js غير محمل أو غير صحيح.');}
  const {data,error}=await window.alfalahSupabase.from('library_evaluations').select('*').order('updated_at',{ascending:false});
  if(error) throw error;
  const latest={};
  (data||[]).forEach(r=>{const key=r.school_code || (SCHOOLS.find(s=>s.id===r.school_id)||{}).code || String(r.school_id); if(!latest[key]) latest[key]=r;});
  return latest;
}
function render(latest){
  const report=document.getElementById('report'); clear(report);
  const rows=SCHOOLS.map(s=>{const d=latest[s.code] || latest[String(s.id)] || null; const av=d?avgFromRow(d):0; return {s,d,av,done:!!d};});
  const done=rows.filter(r=>r.done);
  if(!done.length){const c=el('div','card'); c.appendChild(el('h2','','لا توجد تقييمات محفوظة بعد')); c.appendChild(el('p','muted','ابدأ بحفظ تقييم مدرسة واحدة على الأقل من صفحة نظام التقييم.')); report.appendChild(c); return;}
  const overall=Math.round(done.reduce((a,r)=>a+r.av,0)/done.length*10)/10;
  const sorted=[...done].sort((a,b)=>b.av-a.av);
  const best=sorted[0]; const weakest=[...done].sort((a,b)=>a.av-b.av)[0];
  const kpis=el('div','kpis'); kpis.appendChild(kpi(done.length+' / 6','تقييمات مكتملة')); kpis.appendChild(kpi(overall,'المتوسط العام')); kpis.appendChild(kpi(best.s.short,'الأعلى تقييماً')); kpis.appendChild(kpi(weakest.s.short,'الأكثر احتياجاً للتحسين')); report.appendChild(kpis);
  const summary=el('div','card'); summary.appendChild(el('h2','','ملخص إداري')); const note=el('div','note'); note.textContent='بلغ المتوسط العام للمدارس المحفوظة '+overall+' من 6. أفضل نتيجة حالياً في '+best.s.name+'، بينما تحتاج '+weakest.s.name+' إلى متابعة أوضح في خطة التحسين. هذا التقرير يعتمد على البيانات المركزية المحفوظة في Supabase.'; summary.appendChild(note); report.appendChild(summary);
  const tableCard=el('div','card'); tableCard.appendChild(el('h2','','ترتيب المدارس')); const table=document.createElement('table'); const thead=document.createElement('thead'); const hr=document.createElement('tr'); ['#','المدرسة','المدينة','المتوسط','المستوى','فتح الملف'].forEach(h=>hr.appendChild(el('th','',h))); thead.appendChild(hr); table.appendChild(thead); const tbody=document.createElement('tbody'); sorted.forEach((r,i)=>{const tr=document.createElement('tr'); [String(i+1),r.s.name,r.s.city,String(r.av)].forEach(x=>tr.appendChild(el('td','',x))); const tdLevel=el('td'); tdLevel.appendChild(el('span','tag',level(r.av))); tr.appendChild(tdLevel); const tdLink=el('td'); const a=el('a','btn outline','فتح'); a.href='../schools/'+r.s.code+'/index.html'; tdLink.appendChild(a); tr.appendChild(tdLink); tbody.appendChild(tr);}); table.appendChild(tbody); tableCard.appendChild(table); report.appendChild(tableCard);
  const grid=el('div','grid'); done.forEach(r=>{const c=el('div','card school-card'); c.appendChild(el('h3','',r.s.short)); c.appendChild(el('div','muted',r.s.city)); const bar=el('div','bar'); bar.style.margin='12px 0'; const fill=el('div','fill'); fill.style.width=pct(r.av)+'%'; bar.appendChild(fill); c.appendChild(bar); c.appendChild(el('b','',r.av+' من 6 — '+level(r.av))); grid.appendChild(c);}); report.appendChild(grid);
}
async function loadReport(){const status=document.getElementById('status'); status.className='card'; status.innerHTML='<h2>جاري تحميل البيانات...</h2><p class="muted">يتم جلب التقييمات من Supabase.</p>'; try{const latest=await getEvaluations(); status.innerHTML='<h2 class="ok">تم تحميل البيانات بنجاح</h2><p class="muted">آخر تحديث: '+new Date().toLocaleString('ar-AE')+'</p>'; render(latest);}catch(e){status.className='card error'; status.innerHTML='<h2>تعذر تحميل البيانات</h2><p>'+String(e.message||e)+'</p><p class="muted">تحقق من supabase-config.js ومن سياسات RLS.</p>';}}
loadReport();
</script>
</body>
</html>
