<!doctype html>
<html lang="ar" dir="rtl">
<head>

<title>التقرير الذكي النهائي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
:root{--navy:#0b3d70;--blue:#1760a8;--teal:#0f8f82;--green:#0f6e56;--gold:#b87413;--amber:#f0a500;--bg:#eaf2fb;--card:#fff;--text:#102a43;--muted:#607d9d;--border:#b9d5f2;--pink:#e85d9e;--red:#c0392b;--soft:#f6fbff;--grad:linear-gradient(135deg,#0b3d70,#1760a8,#0f8f82)}
*{box-sizing:border-box}body{margin:0;font-family:Cairo,Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl}.wrap{max-width:1180px;margin:auto;padding:18px 18px 80px}.home{position:fixed;top:14px;right:14px;z-index:99;background:var(--grad);color:#fff;text-decoration:none;padding:10px 16px;border-radius:22px;font-weight:900;box-shadow:0 8px 24px #0003}.hero{position:relative;overflow:hidden;background:var(--grad);color:#fff;text-align:center;border-radius:28px;padding:34px 26px;margin:0 0 18px;box-shadow:0 12px 32px #0b3d7030}.hero:before{content:"";position:absolute;width:260px;height:260px;border-radius:50%;background:#fff1;left:-75px;top:-75px}.hero img{display:block;margin:0 auto 16px;max-width:170px;background:#fff;border-radius:20px;padding:10px 16px;box-shadow:0 10px 25px #0002}.hero h1{font-size:38px;line-height:1.25;margin:0;font-weight:900}.hero p{margin:10px 0 0;opacity:.9;font-size:16px}.card{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:22px;margin:18px 0;box-shadow:0 6px 20px #0b3d7012}.card h2{margin:0 0 16px;font-size:26px;color:var(--navy);font-weight:900}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}label{display:block;font-weight:900;color:var(--navy);margin:0 0 6px}select,input,textarea{width:100%;min-height:48px;border:2px solid var(--border);border-radius:14px;background:#f8fbff;padding:10px 12px;font-family:Cairo,sans-serif;color:var(--text);outline:none}select:focus,input:focus,textarea:focus{background:#fff;border-color:var(--blue);box-shadow:0 0 0 3px #1760a822}.hint{font-size:12px;color:var(--muted);line-height:1.7;margin-top:4px}.btn{border:0;border-radius:14px;padding:12px 22px;font-family:Cairo,sans-serif;font-weight:900;cursor:pointer;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.teal{background:linear-gradient(135deg,#0f6e56,#0f9d8a);color:#fff}.btn.gold{background:linear-gradient(135deg,#b87413,#f0a500);color:#fff}.btn.blue{background:linear-gradient(135deg,#0b3d70,#1760a8);color:#fff}.btn.outline{background:#fff;border:2px solid var(--border);color:var(--navy)}.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}.multi{position:relative}.multi-btn{width:100%;min-height:48px;border:2px solid var(--border);border-radius:14px;background:#f8fbff;padding:10px 12px;text-align:right;font-family:Cairo,sans-serif;cursor:pointer}.multi.open .multi-btn{border-color:var(--blue);background:#fff}.multi-panel{display:none;position:absolute;right:0;left:0;top:calc(100% + 6px);z-index:50;background:#fff;border:2px solid var(--border);border-radius:16px;box-shadow:0 16px 36px #0c447c30;max-height:245px;overflow:auto;padding:8px}.multi.open .multi-panel{display:block}.multi-panel label{display:flex;align-items:center;gap:9px;margin:0;padding:9px;border-radius:10px;font-weight:700;color:var(--text);cursor:pointer}.multi-panel label:hover{background:#eef6ff}.multi-panel input{width:auto;min-height:auto;accent-color:var(--teal)}.story{background:linear-gradient(90deg,#eefbf7,#f8fffd);border-right:7px solid var(--teal);border-radius:18px;padding:18px 20px;line-height:2;font-size:16px}.notice{background:linear-gradient(90deg,#fff8e6,#fffdf5);border-right:7px solid var(--gold);border-radius:18px;padding:16px 18px;line-height:2}.kpi{position:relative;overflow:hidden;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:18px;text-align:center}.kpi:after{content:"";position:absolute;inset:auto -35px -45px auto;width:110px;height:110px;border-radius:50%;background:#0f8f8212}.kpi strong{display:block;font-size:34px;color:var(--navy);font-weight:900;line-height:1}.kpi span{display:block;margin-top:7px;color:var(--muted);font-weight:900}.kpi small{display:block;color:var(--green);font-weight:800;margin-top:4px}.pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900;background:#eaf6ff;color:var(--navy);border:1px solid var(--border)}.pill.ok{background:#e6f7f0;color:#0a5b48}.pill.warn{background:#fff8df;color:#815100}.pill.risk{background:#fdecec;color:#9d2d24}.section-title{display:flex;align-items:center;gap:10px;margin:24px 0 12px;color:var(--navy);font-weight:900;font-size:22px}.section-title:before{content:"";width:42px;height:6px;border-radius:8px;background:linear-gradient(90deg,var(--blue),var(--teal))}.chart{background:#fff;border:1.5px solid var(--border);border-radius:22px;padding:18px;min-height:210px}.chart h3{font-size:20px;color:var(--navy);margin:0 0 10px;font-weight:900}.chart .explain{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:12px}.bar-row{display:grid;grid-template-columns:160px 1fr 60px;gap:12px;align-items:center;margin:12px 0}.bar-label{font-weight:900;color:var(--navy)}.bar{height:18px;background:#e7eff8;border-radius:999px;overflow:hidden;box-shadow:inset 0 0 0 1px #d4e4f6}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--teal),var(--pink),var(--amber))}.bar-val{font-weight:900;color:var(--navy)}.axis-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.axis-card{background:#f8fbff;border:1.5px solid var(--border);border-radius:18px;padding:14px}.axis-card h4{margin:0 0 8px;color:var(--navy);font-size:16px}.axis-card p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.8}.donut{width:170px;height:170px;border-radius:50%;margin:10px auto;background:conic-gradient(var(--teal) var(--p), #dfe8f3 0);position:relative}.donut:after{content:attr(data-label);position:absolute;inset:31px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--navy);font-size:24px}.legend{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:12px;color:var(--muted)}.legend b{display:inline-block;width:11px;height:11px;border-radius:3px;margin-left:4px}.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.insight{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:16px;line-height:1.8}.insight .ico{font-size:24px}.insight h3{margin:4px 0 8px;color:var(--navy);font-size:18px}.insight p{margin:0;color:var(--text);font-size:14px}.school-card{background:#fff;border:1.5px solid var(--border);border-right:6px solid var(--teal);border-radius:22px;padding:18px;margin:12px 0;line-height:1.9}.school-card h3{margin:0 0 8px;color:var(--navy);font-size:22px}.quote{background:#f8fbff;border:1px solid var(--border);border-radius:16px;padding:13px 15px;margin:10px 0}.quote b{color:var(--navy)}.rec-list{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.rec{border-radius:20px;padding:16px;line-height:1.9;border:1.5px solid var(--border);background:#fff}.rec.urgent{border-right:7px solid var(--red)}.rec.mid{border-right:7px solid var(--amber)}.rec.strategy{border-right:7px solid var(--teal)}.rec h3{margin:0 0 8px;color:var(--navy)}.slide-mode .builder,.slide-mode .home,.slide-mode .actions.no-slide{display:none!important}.slide-mode .wrap{max-width:100%;padding:0}.slide-mode .hero{border-radius:0;margin:0;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center}.slide-mode .card{border:0;border-radius:0;box-shadow:none;min-height:calc(100vh - 240px);padding:38px 7vw;margin:0}.slide-mode .grid,.slide-mode .grid3,.slide-mode .grid4{gap:22px}.slide-mode .kpi strong{font-size:50px}.slide-toggle{position:fixed;left:14px;bottom:14px;z-index:100;background:var(--grad);color:#fff;border:0;border-radius:999px;padding:12px 18px;font-weight:900;font-family:Cairo,sans-serif;box-shadow:0 8px 24px #0003;cursor:pointer}@media(max-width:900px){.grid,.grid3,.grid4,.grid5,.insight-grid,.axis-grid,.rec-list{grid-template-columns:1fr}.bar-row{grid-template-columns:1fr}.hero h1{font-size:28px}.wrap{padding:12px}.card{padding:16px}.home{top:auto;bottom:12px;right:12px}.slide-toggle{left:10px;bottom:10px}}@media print{.home,.builder,.slide-toggle,.actions{display:none!important}.wrap{max-width:100%;padding:0}.card{box-shadow:none;break-inside:avoid}.hero{box-shadow:none;border-radius:0}.grid,.grid3{break-inside:avoid}}
</style>
</head>
<body>
<a class="home" href="../index.html">🏠 الرئيسية</a>
<button class="slide-toggle" onclick="toggleSlideMode()">🎞️ وضع العرض</button>
<div class="wrap">
<section class="hero"><img src="../assets/logo.png" alt="شعار أكاديمية الفلاح" onerror="this.style.display='none'"><h1>التقرير الذكي النهائي</h1><p>تقرير سردي بصري يحوّل تقييمات المكتبات إلى قصة إدارية واضحة وتوصيات قابلة للتنفيذ</p></section>
<section class="card builder"><h2>إعداد التقرير</h2><div class="grid3"><div><label>نوع التقرير</label><select id="type"><option value="evaluation">تقييم المكتبات</option><option value="all">تقرير شامل</option><option value="school">مدرسة محددة</option><option value="special">موضوع خاص</option></select></div><div><label>المدرسة / المدارس</label><div class="multi" id="schoolPicker"><button type="button" class="multi-btn" onclick="toggleSchoolPicker(event)"><span id="schoolPickerText">— بدون تحديد —</span></button><div class="multi-panel" id="schoolPanel"><label><input type="checkbox" value="all" onchange="updateSchoolPicker()"> كل المدارس</label><label><input type="checkbox" value="khb" onchange="updateSchoolPicker()"> الخبيصي</label><label><input type="checkbox" value="jmi" onchange="updateSchoolPicker()"> الجيمي</label><label><input type="checkbox" value="shj" onchange="updateSchoolPicker()"> الشارقة</label><label><input type="checkbox" value="bny" onchange="updateSchoolPicker()"> بني ياس</label><label><input type="checkbox" value="mzd" onchange="updateSchoolPicker()"> محمد بن زايد</label><label><input type="checkbox" value="dan" onchange="updateSchoolPicker()"> الدانة</label></div></div><div class="hint">اختر مدرسة أو أكثر. عدم الاختيار يعني كل البيانات المتاحة.</div></div><div><label>مستوى العرض</label><select id="level"><option value="story">سرد تنفيذي جميل</option><option value="brief">مختصر للمدير</option><option value="full">تفصيلي تحليلي</option></select></div><div><label>عنوان خاص</label><input id="title" placeholder="مثال: تقرير مكتبة الشارقة"></div><div><label>ملاحظة توجيهية</label><input id="note" placeholder="مثال: ركّز على التقنية والأنشطة"></div></div><div class="actions"><button class="btn teal" onclick="renderReport()">✨ توليد التقرير</button><button class="btn gold" onclick="window.print()">🖨️ طباعة / PDF</button><button class="btn outline" onclick="copyReportText()">📋 نسخ النص</button></div></section>
<section id="reportBody" class="card"><div class="notice">اختر المدرسة أو اترك الاختيار مفتوحًا، ثم اضغط توليد التقرير.</div></section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=20260513story"></script>
<script src="../supabase-config.js?v=20260513story"></script>
<script>
const SCHOOL_NAMES={khb:'الخبيصي',jmi:'الجيمي',shj:'الشارقة',bny:'بني ياس',mzd:'محمد بن زايد',dan:'الدانة',all:'كل المدارس'};
const SCHOOL_FULL={khb:'أكاديمية الفلاح فرع الخبيصي',jmi:'أكاديمية الفلاح فرع الجيمي',shj:'مدرسة الفلاح الخاصة - الدخيلات',bny:'أكاديمية الفلاح فرع بني ياس',mzd:'أكاديمية الفلاح فرع محمد بن زايد',dan:'أكاديمية الفلاح فرع الدانة'};
const DBID={1:'dan',2:'mzd',3:'bny',4:'khb',5:'jmi',6:'shj'};
const AXIS_GROUPS={'المجموعات والمصادر':['المجموعات','مجموعات الإمارات'],'الإدارة والتنظيم':['التنظيم الفني'],'البيئة والخدمات':['البيئة'],'الأنشطة والشراكات':['الأنشطة','الشراكات'],'الكادر المهني':['الكادر والمؤهلات'],'التقنية والابتكار':['التقنية']};
function $(id){return document.getElementById(id)}
function val(id){return $(id)?.value||''}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function parseObj(x){if(!x)return {}; if(typeof x==='object')return x; try{return JSON.parse(x)}catch(e){return {}}}
function loadLS(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}
function sb(){return window.alfalahSupabase||window.supabaseClient||(window.AlfalahDBSync&&window.AlfalahDBSync.client&&window.AlfalahDBSync.client())||null}
function iso(v){if(!v)return '';let s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);let m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:''}
function dmy(s){if(!s)return '—';let p=String(s).slice(0,10).split('-');return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:s}
function getSchoolChecks(){return [...document.querySelectorAll('#schoolPanel input[type=checkbox]')]}
function toggleSchoolPicker(e){if(e)e.stopPropagation();$('schoolPicker')?.classList.toggle('open')}
function updateSchoolPicker(){let selected=getSchoolChecks().filter(c=>c.checked).map(c=>c.value);if(selected.includes('all'))getSchoolChecks().forEach(c=>{if(c.value!=='all')c.checked=false});selected=getSchoolChecks().filter(c=>c.checked).map(c=>c.value);$('schoolPickerText').textContent=selected.length?selected.map(x=>SCHOOL_NAMES[x]||x).join('، '):'— بدون تحديد —'}
document.addEventListener('click',e=>{let p=$('schoolPicker');if(p&&!p.contains(e.target))p.classList.remove('open')});
function selected(){return{type:val('type'),schools:getSchoolChecks().filter(c=>c.checked).map(c=>c.value),level:val('level')||'story',title:val('title'),note:val('note')}}
function normalizeSid(sid,name=''){let s=String(sid||'').trim();if(/^\d+$/.test(s))s=DBID[Number(s)]||s;let t=(s+' '+String(name||'')).toLowerCase();if(t.includes('shj')||t.includes('الشارقة')||t.includes('الدخيلات'))return'shj';if(t.includes('khb')||t.includes('الخبيصي'))return'khb';if(t.includes('jmi')||t.includes('الجيمي'))return'jmi';if(t.includes('bny')||t.includes('بني ياس'))return'bny';if(t.includes('mzd')||t.includes('محمد بن زايد'))return'mzd';if(t.includes('dan')||t.includes('الدانة'))return'dan';return s}
function schoolMatch(name,sid,filters){if(!filters.length||filters.includes('all'))return true;let ns=normalizeSid(sid,name);let t=(ns+' '+String(name||'')).toLowerCase();return filters.some(f=>ns===f||t.includes(f)||t.includes(String(SCHOOL_NAMES[f]||'').toLowerCase()))}
function unwrapCandidate(d,row){if(!d||typeof d!=='object'||Array.isArray(d))return {}; if(d.ev&&typeof d.ev==='object'){let sid=normalizeSid(row?.school_code||row?.school_id||d.school_code||d.school_id||'',row?.school_name||d.school_name||d['f-sname']||'');if(sid&&d.ev[sid])return Object.assign({school_code:sid},parseObj(d.ev[sid]));let first=Object.entries(d.ev).find(([k,v])=>v&&typeof v==='object');if(first)return Object.assign({school_code:first[0]},parseObj(first[1]));} if(d.form&&typeof d.form==='object')return d.form; return d}
function unwrapEvalData(row){const keys=['full_data','evaluation_data','data','form_data','json_data','content','payload','report_data','raw_data','details'];for(const k of keys){let un=unwrapCandidate(parseObj(row?.[k]),row);if(un&&Object.keys(un).length)return un}return unwrapCandidate(row,row)||{}}
function axisFromRatings(d){let a=Object.assign({},d._axisScores||{});if(!Object.keys(a).length){let map={'المجموعات':[d.r_cd,d.r_cc,d.r_cco],'مجموعات الإمارات':[d.r_uae],'التنظيم الفني':[d.r_sh,d.r_cr,d.r_sp,d.r_se,d.r_at,d.r_in,d.r_rch],'البيئة':[d.r_ts,d.r_ss,d.r_sb,d.r_sc,d.r_sst,d.r_si,d.r_ste,d.r_scol],'الأنشطة':[d.r_tu,d.r_cu,d.r_ri],'الشراكات':[d.r_pa,d.r_co],'الكادر والمؤهلات':[d.r_marc,d.r_ils,d.r_dg,d.r_te,d.r_un],'التقنية':[d.r_ils,d.r_dg,d.r_te]};Object.entries(map).forEach(([k,arr])=>{let nums=arr.map(Number).filter(n=>n>0);if(nums.length)a[k]=Math.round((nums.reduce((x,y)=>x+y,0)/nums.length)*10)/10})}return a}
function evalScore(row,d){let nums=[];['total_score','score','average','avg','rating_score','final_score','f-total-score'].forEach(k=>{let n=Number(row?.[k]??d?.[k]??0);if(n>0)nums.push(n>6?n/100*6:n)});let ax=axisFromRatings(d);if(!nums.length&&Object.keys(ax).length)nums=Object.values(ax).map(Number).filter(n=>n>0);if(!nums.length)Object.entries(d||{}).forEach(([k,v])=>{let n=Number(v);if((/^r[_-]/.test(k)||/^rating/.test(k))&&n>=1&&n<=6)nums.push(n)});return nums.length?Math.round((nums.reduce((a,b)=>a+b,0)/nums.length)*10)/10:0}
function level(score){if(score>=5)return{txt:'قوي',cls:'ok',desc:'الأداء مرتفع ويمكن البناء عليه كنموذج ممارسة.'};if(score>=4)return{txt:'جيد',cls:'ok',desc:'الأداء جيد ويحتاج تحسينات محددة.'};if(score>=3)return{txt:'مقبول',cls:'warn',desc:'الأداء مقبول لكن توجد فجوات واضحة تحتاج متابعة.'};if(score>0)return{txt:'يحتاج تدخل',cls:'risk',desc:'الأداء منخفض ويتطلب خطة معالجة قريبة.'};return{txt:'غير مكتمل',cls:'warn',desc:'لا توجد بيانات كافية للحكم.'}}
async function loadEvaluations(){let rows=[];try{let c=sb();if(c){let r=await c.from('library_evaluations').select('*').order('updated_at',{ascending:false});if(!r.error&&Array.isArray(r.data))rows=r.data;else if(r.error)console.warn('library_evaluations error',r.error)}}catch(e){console.warn(e)}let ev=loadLS('falah_lib_v6',{ev:{}}).ev||{};Object.entries(ev).forEach(([k,v])=>{if(v)rows.push(Object.assign({school_code:k,school_id:k,school_name:SCHOOL_FULL[k]||SCHOOL_NAMES[k]},v))});let out=[];for(const r of rows){let d=unwrapEvalData(r);let sid=normalizeSid(r.school_code||r.school_id||d.school_code||d.school_id||d.branch_code||'',r.school_name||d.school_name||d['f-sname']||d['f-city']||'');let school=r.school_name||d.school_name||d['f-sname']||d.sname||SCHOOL_FULL[sid]||SCHOOL_NAMES[sid]||sid||'غير محدد';let score=evalScore(r,d);let visitDate=iso(r.visit_date||r.date||d.visit_date||d['f-date']||d.date||'');let axes=axisFromRatings(d);out.push({sid,school,score,axes,data:d,visit_date:visitDate,created_at:r.updated_at||r.created_at||d.savedAt||d.exported||''})}let latest=new Map();out.filter(e=>e.sid||e.school).forEach(e=>{let key=(e.sid||e.school)+'|'+(e.visit_date||'');if(!latest.has(key))latest.set(key,e)});return [...latest.values()]}
function filterEvals(evals,s){return evals.filter(e=>schoolMatch(e.school,e.sid,s.schools))}
function avg(arr){let n=arr.map(Number).filter(x=>x>0);return n.length?Math.round(n.reduce((a,b)=>a+b,0)/n.length*10)/10:0}
function metrics(evals){let schools=new Set(evals.map(e=>e.sid||e.school));let scores=evals.map(e=>e.score).filter(Boolean);let m=avg(scores);let best=[...evals].sort((a,b)=>b.score-a.score)[0];let worst=[...evals].filter(e=>e.score>0).sort((a,b)=>a.score-b.score)[0];let allAxes={};evals.forEach(e=>Object.entries(e.axes||{}).forEach(([k,v])=>{(allAxes[k]??=[]).push(Number(v))}));let axes=Object.entries(allAxes).map(([k,v])=>({name:k,score:avg(v)})).sort((a,b)=>b.score-a.score);return{schools:schools.size,evals:evals.length,avg:m,best,worst,axes,donePct:Math.round((schools.size/6)*100)}}
function bar(label,score){let pct=Math.max(0,Math.min(100,(Number(score)||0)/6*100));let lv=level(score);return `<div class="bar-row"><div class="bar-label">${esc(label)}</div><div class="bar"><div class="fill" style="width:${pct}%"></div></div><div class="bar-val">${score?score.toFixed?score.toFixed(1):score:'—'}/6</div></div><div class="hint" style="margin:-6px 0 8px 0"><span class="pill ${lv.cls}">${lv.txt}</span> ${lv.desc}</div>`}
function kpis(m){let lv=level(m.avg);return `<div class="grid4"><div class="kpi"><strong>${m.schools}</strong><span>مدارس مقروءة</span><small>من أصل 6</small></div><div class="kpi"><strong>${m.evals}</strong><span>تقييمات محفوظة</span><small>من قاعدة البيانات</small></div><div class="kpi"><strong>${m.avg?m.avg+'/6':'—'}</strong><span>متوسط الأداء</span><small>${lv.txt}</small></div><div class="kpi"><strong>${m.donePct}%</strong><span>نسبة الإنجاز</span><small>بحسب المدارس المختارة</small></div></div>`}
function storyIntro(evals,m,s){let scope=s.schools.length&&!s.schools.includes('all')?s.schools.map(x=>SCHOOL_NAMES[x]||x).join('، '):'جميع المدارس المتاحة';let lv=level(m.avg);let weak=m.axes.length?m.axes[m.axes.length-1].name:'غير محدد';let strong=m.axes.length?m.axes[0].name:'غير محدد';return `<div class="story"><b>الخلاصة التنفيذية:</b> يعرض هذا التقرير قراءة إدارية مبسطة لبيانات ${esc(scope)}. متوسط الأداء الحالي هو <b>${m.avg?m.avg+'/6':'غير متاح'}</b>، وهذا يعني أن الوضع العام <span class="pill ${lv.cls}">${lv.txt}</span>. أقوى محور ظاهر هو <b>${esc(strong)}</b>، بينما يحتاج محور <b>${esc(weak)}</b> إلى متابعة أوضح في الخطة القادمة. ${s.note?'<br><b>توجيه المستخدم:</b> '+esc(s.note):''}</div>`}
function insightCards(m){let weak=m.axes[m.axes.length-1]||{};let strong=m.axes[0]||{};return `<div class="insight-grid"><div class="insight"><div class="ico">✅</div><h3>ما الذي يعمل جيدًا؟</h3><p>المؤشرات الأعلى تظهر في محور <b>${esc(strong.name||'—')}</b> بدرجة ${strong.score||'—'}/6، وهو محور يمكن استخدامه كنقطة انطلاق للتطوير.</p></div><div class="insight"><div class="ico">⚠️</div><h3>أين توجد الفجوة؟</h3><p>أضعف محور ظاهر هو <b>${esc(weak.name||'—')}</b> بدرجة ${weak.score||'—'}/6، لذلك يحتاج إلى متابعة مباشرة ومؤشرات تنفيذ.</p></div><div class="insight"><div class="ico">🎯</div><h3>ما القرار المطلوب؟</h3><p>اعتماد خطة قصيرة المدى لمعالجة المحاور الأقل، ثم مراجعة التحسن في التقييم التالي بدل الاكتفاء بعرض النتائج.</p></div></div>`}
function axisChart(m){let axes=m.axes.length?m.axes:[];return `<div class="chart"><h3>قراءة المحاور الرئيسية</h3><div class="explain">كل شريط يوضح قوة المحور من 6. الهدف من الرسم ليس الرقم فقط، بل تحديد أين نبدأ التطوير.</div>${axes.length?axes.map(a=>bar(a.name,a.score)).join(''):'<div class="notice">لا توجد محاور كافية للرسم.</div>'}</div>`}
function completionDonut(m){let p=Math.max(0,Math.min(100,m.donePct||0));return `<div class="chart"><h3>مؤشر الإنجاز العام</h3><div class="explain">يوضح نسبة المدارس التي لديها تقييمات محفوظة مقارنة بعدد المدارس المستهدف.</div><div class="donut" style="--p:${p}%" data-label="${p}%"></div><div class="legend"><span><b style="background:var(--teal)"></b>منجز</span><span><b style="background:#dfe8f3"></b>متبقٍ</span></div></div>`}
function schoolCards(evals){if(!evals.length)return'<div class="notice">لا توجد تقييمات مطابقة للاختيار.</div>';return evals.map(e=>{let d=e.data||{},lv=level(e.score);let str=d['f-str']||d.str||'لم تُسجل نقاط قوة نصية واضحة.';let wk=d['f-wk']||d.wk||'لم تُسجل نقاط ضعف نصية واضحة.';let rec=d['f-rec']||d.rec||'تحتاج التوصيات إلى اعتماد أو تحديث.';let plan=d['f-plan']||d.plan||'تحتاج الخطة إلى توثيق تفصيلي.';return `<div class="school-card"><h3>${esc(e.school)} ${e.visit_date?'<span class="pill">'+dmy(e.visit_date)+'</span>':''}</h3><p><span class="pill ${lv.cls}">${lv.txt}</span> متوسط الأداء: <b>${e.score?e.score+'/6':'—'}</b>. ${lv.desc}</p><div class="grid"><div class="quote"><b>نقاط القوة</b><br>${esc(str).replace(/\n/g,'<br>')}</div><div class="quote"><b>الفجوات</b><br>${esc(wk).replace(/\n/g,'<br>')}</div></div><div class="quote"><b>التوصية الإدارية</b><br>${esc(rec).replace(/\n/g,'<br>')}</div><div class="quote"><b>خطة العمل</b><br>${esc(plan).replace(/\n/g,'<br>')}</div></div>`}).join('')}
function recommendations(m){let weak=m.axes[m.axes.length-1]||{}, strong=m.axes[0]||{};return `<div class="rec-list"><div class="rec urgent"><h3>تدخل عاجل</h3><p>توجيه المتابعة إلى محور <b>${esc(weak.name||'المحور الأضعف')}</b> وتحديد إجراء قابل للتنفيذ خلال شهر.</p></div><div class="rec mid"><h3>تحسين متوسط</h3><p>تحويل نقاط القوة في <b>${esc(strong.name||'المحور الأقوى')}</b> إلى ممارسة معيارية قابلة للتكرار بين المدارس.</p></div><div class="rec strategy"><h3>قرار استراتيجي</h3><p>اعتماد لوحة متابعة شهرية تعرض المؤشرات نفسها: الأداء، المحاور، التوصيات، وحالة التنفيذ.</p></div></div>`}
function buildReport(evals,s){let m=metrics(evals);let title=s.title||'تقرير ذكي لمكتبات أكاديمية الفلاح';let html=`<h2>${esc(title)}</h2>${storyIntro(evals,m,s)}${kpis(m)}<div class="section-title">ماذا تقول البيانات؟</div>${insightCards(m)}<div class="grid">${axisChart(m)}${completionDonut(m)}</div><div class="section-title">التوصيات الموجهة للإدارة</div>${recommendations(m)}`;if(s.level!=='brief')html+=`<div class="section-title">تفاصيل المدارس والتقييمات</div>${schoolCards(evals)}`;html+=`<div class="notice"><b>ملاحظة قراءة:</b> هذا التقرير يركز على تحويل الأرقام إلى قرارات. ارتفاع الدرجة لا يعني الاكتفاء، وانخفاضها لا يعني الفشل؛ بل يحدد أين تبدأ المتابعة.</div>`;return html}
async function renderReport(){let b=$('reportBody');b.innerHTML='<div class="notice">جاري قراءة البيانات من Supabase وبناء التقرير...</div>';let s=selected();let evals=filterEvals(await loadEvaluations(),s);b.innerHTML=buildReport(evals,s)}
function copyReportText(){let b=$('reportBody');navigator.clipboard?.writeText(b?b.innerText:'');alert('تم نسخ نص التقرير')}
function toggleSlideMode(){document.body.classList.toggle('slide-mode')}
function applyParams(){let p=new URLSearchParams(location.search);['type','level','title','note'].forEach(k=>{if(p.get(k)&&$(k))$(k).value=p.get(k)});let schools=(p.get('schools')||'').split(',').filter(Boolean);if(schools.length){getSchoolChecks().forEach(c=>c.checked=schools.includes(c.value));updateSchoolPicker();renderReport()}if(p.get('director'))document.body.classList.add('slide-mode')}
document.addEventListener('DOMContentLoaded',applyParams);
</script>
</body>
</html>
