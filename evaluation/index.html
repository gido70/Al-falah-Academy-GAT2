<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>نظام تقييم المكتبات</title><link rel="stylesheet" href="../assets/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js"></script><script src="../assets/app.js"></script></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>نظام تقييم المكتبات</h1><p>احفظ التقييم رسميًا في قاعدة البيانات ليسترجع من أي جهاز</p></section><div class="card"><h2>بيانات المدرسة والزيارة</h2><div class="row"><div><label>المدرسة</label><select id="school"></select></div><div><label>تاريخ الزيارة</label><input id="visit_date" type="date"></div><div><label>اسم الأخصائي</label><input id="librarian_name" placeholder="اسم أخصائي مصادر التعلم"></div><div><label>ملاحظات عامة</label><input id="general_notes" placeholder="ملاحظات مختصرة"></div></div></div><div class="card"><h2>محاور التقييم</h2><div class="ratings" id="ratings"></div></div><div class="card"><h2>التحليل والتوصيات</h2><label>نقاط القوة</label><textarea id="strengths"></textarea><label>نقاط الضعف</label><textarea id="weaknesses"></textarea><label>التوصيات</label><textarea id="recommendations"></textarea><div class="nav"><button class="btn teal" onclick="saveEvaluation()">💾 حفظ التقييم الرسمي</button><button class="btn outline" onclick="loadLatest()">↩️ استرجاع آخر تقييم للمدرسة</button></div><div id="msg"></div></div></div><script>
const AXES=[['r_uae','مجموعات الإمارات'],['r_cd','تنوع المجموعات'],['r_cc','حداثة المجموعات'],['r_cco','توافق المحتوى مع المنهاج'],['r_sh','تنظيم الأرفف'],['r_cr','سجلات الإعارة'],['r_sp','جاهزية المكان'],['r_at','البيئة الجاذبة'],['r_rch','الأنشطة القرائية'],['r_ste','التقنية والمصادر الرقمية']];
const scores={};function renderRatings(){q('ratings').innerHTML=AXES.map(([k,n])=>`<div class="ratebox"><b>${n}</b><div class="scale">${[1,2,3,4,5,6].map(v=>`<button id="${k}_${v}" onclick="setScore('${k}',${v})">${v}</button>`).join('')}</div></div>`).join('')}function setScore(k,v){scores[k]=v;[1,2,3,4,5,6].forEach(x=>{const b=q(k+'_'+x); if(b)b.classList.toggle('active',x===v)})}
function formData(){const school=schoolById(q('school').value);const values=Object.values(scores);const avg=values.length?Math.round(values.reduce((a,b)=>a+b,0)/values.length*10)/10:0;return {school_id:school?.id||null,school_code:school?.code||'',school_name:school?.name||'',visit_date:q('visit_date').value||null,librarian_name:q('librarian_name').value,total_score:avg,final_level:avg>=5?'متميز':avg>=4?'جيد جداً':avg>=3?'مقبول':'يحتاج تحسين',strengths:q('strengths').value,weaknesses:q('weaknesses').value,recommendations:q('recommendations').value,general_notes:q('general_notes').value,scores:scores}}
async function saveEvaluation(){const d=formData();if(!d.school_id){showMsg('msg','اختر المدرسة أولاً.','err');return}const sb=SB();const {error}=await sb.from('library_evaluations').insert({school_id:d.school_id,school_code:d.school_code,visit_date:d.visit_date,librarian_name:d.librarian_name,total_score:d.total_score,final_level:d.final_level,strengths:d.strengths,weaknesses:d.weaknesses,recommendations:d.recommendations,full_data:d});if(error){showMsg('msg','فشل الحفظ: '+error.message,'err')}else{showMsg('msg','تم حفظ التقييم رسميًا في Supabase.','ok')}}
async function loadLatest(){const sid=q('school').value;if(!sid){showMsg('msg','اختر المدرسة أولاً.','warn');return}const sb=SB();const {data,error}=await sb.from('library_evaluations').select('*').eq('school_id',sid).order('created_at',{ascending:false}).limit(1);if(error||!data?.length){showMsg('msg','لا يوجد تقييم محفوظ لهذه المدرسة.','warn');return}const f=data[0].full_data||{};q('visit_date').value=f.visit_date||'';q('librarian_name').value=f.librarian_name||'';q('general_notes').value=f.general_notes||'';q('strengths').value=f.strengths||data[0].strengths||'';q('weaknesses').value=f.weaknesses||data[0].weaknesses||'';q('recommendations').value=f.recommendations||data[0].recommendations||'';Object.keys(scores).forEach(k=>delete scores[k]);Object.entries(f.scores||{}).forEach(([k,v])=>setScore(k,Number(v)));showMsg('msg','تم استرجاع آخر تقييم.','ok')}
document.addEventListener('DOMContentLoaded',()=>{fillSchools('school');renderRatings();q('visit_date').value=new Date().toISOString().slice(0,10)})
</script></body></html>
