<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تقييم المكتبات</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="../assets/css/style.css"></head><body><script src="../assets/js/supabaseClient.js"></script><script src="../assets/js/common.js"></script><script>pageHeader('نظام تقييم المكتبات')</script>
<div class="card"><h2>بيانات التقييم</h2><div id="msg" class="msg">اختر المدرسة ثم أدخل التقييم.</div><div class="grid"><div><label>المدرسة</label><select id="school"></select></div><div><label>تاريخ الزيارة</label><input type="date" id="visit_date"></div><div><label>اسم الأخصائي</label><input id="librarian_name"></div><div><label>النتيجة العامة من 6</label><input type="number" min="0" max="6" step="0.1" id="total_score"></div></div></div>
<div class="card"><h2>محاور مختصرة</h2><div class="grid"><div><label>المجموعات والمصادر</label><input type="number" min="1" max="6" id="collections"></div><div><label>مجموعات الإمارات</label><input type="number" min="1" max="6" id="uae"></div><div><label>البيئة المكتبية</label><input type="number" min="1" max="6" id="environment"></div><div><label>الأنشطة والقراءة</label><input type="number" min="1" max="6" id="activities"></div></div><label>نقاط القوة</label><textarea id="strengths"></textarea><label>نقاط الضعف</label><textarea id="weaknesses"></textarea><label>التوصيات</label><textarea id="recommendations"></textarea><div class="row"><button class="btn" id="save">💾 حفظ التقييم في القاعدة</button><button class="btn out" id="load">↻ جلب تقييم المدرسة</button></div></div>
<script>
loadSchools('school');
async function loadEval(){const school_id=Number(val('school')); if(!school_id){showMsg('msg','اختر المدرسة أولًا','bad');return} const {data,error}=await sb.from('library_evaluations').select('*').eq('school_id',school_id).order('updated_at',{ascending:false}).limit(1); if(error){showMsg('msg',error.message,'bad');return} const r=data?.[0]; if(!r){showMsg('msg','لا يوجد تقييم محفوظ لهذه المدرسة.','ok');return} setVal('visit_date',r.visit_date);setVal('librarian_name',r.librarian_name);setVal('total_score',r.total_score);setVal('strengths',r.strengths);setVal('weaknesses',r.weaknesses);setVal('recommendations',r.recommendations);const fd=r.full_data||{};['collections','uae','environment','activities'].forEach(k=>setVal(k,fd[k]));showMsg('msg','تم جلب آخر تقييم محفوظ.','ok')}
async function saveEval(){const school_id=Number(val('school')); if(!school_id){showMsg('msg','اختر المدرسة أولًا','bad');return} const sel=document.getElementById('school'); const school_code=sel.options[sel.selectedIndex].dataset.code; const full_data={collections:val('collections'),uae:val('uae'),environment:val('environment'),activities:val('activities')}; const payload={school_id,school_code,visit_date:val('visit_date')||null,librarian_name:val('librarian_name'),total_score:val('total_score')||null,final_level:'محفوظ',strengths:val('strengths'),weaknesses:val('weaknesses'),recommendations:val('recommendations'),full_data,updated_at:new Date().toISOString()}; const {error}=await sb.from('library_evaluations').upsert(payload,{onConflict:'school_id'}); if(error)showMsg('msg','خطأ الحفظ: '+error.message,'bad'); else showMsg('msg','تم حفظ التقييم في Supabase ويظهر من أي جهاز.','ok')}
document.getElementById('save').onclick=saveEval;document.getElementById('load').onclick=loadEval;document.getElementById('school').addEventListener('change',loadEval);
</script><script>pageFooter()</script></body></html>
