<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../assets/app.css?v=20260503"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js?v=20260503"></script><script src="../assets/app.js?v=20260503"></script><title>جدول الدوام</title><style>.manager-tools{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:15px 0}.checkgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}.checkitem{background:#f8fbff;border:1px solid var(--border);border-radius:12px;padding:10px}.report-box{background:white;border:1px solid var(--border);border-radius:16px;padding:22px;line-height:2;min-height:220px}.editable{outline:2px dashed transparent}.editable:focus{outline-color:var(--gold);background:#fffdf5}.chartbar{height:14px;background:#e5eef8;border-radius:999px;overflow:hidden}.chartbar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:999px}.pill{display:inline-flex;margin:3px;padding:5px 10px;border:1px solid var(--border);border-radius:999px;background:#f8fbff;font-weight:700;color:var(--navy)}.photo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}.photo-card{border:1px solid var(--border);border-radius:14px;background:#f8fbff;padding:10px;text-align:center;word-break:break-word}.photo-card img{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-bottom:8px}@media print{.home,.no-print,.manager-tools,.nav,.btn,button{display:none!important}.wrap{max-width:100%;padding:0}.hero{box-shadow:none;border-radius:0}.card,.report-box{box-shadow:none;border:0}}</style></head><body><a class="home" href="../index.html">🏠 الرئيسية</a>
<div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png" alt="شعار أكاديمية الفلاح"><h1>جدول الدوام والمهام اليومية والمتابعة</h1><p>كل أسبوع سجل مستقل في قاعدة البيانات، مع تفاصيل الحضور والانصراف والمهام اليومية</p></section>
<section class="card"><h2>بيانات الأسبوع</h2><div id="msg" class="msg warn">اكتب رقم الأسبوع أو افتح أسبوعًا محفوظًا.</div><div class="row"><div><label>رقم الأسبوع</label><input id="week_number" type="number" min="1" value="1" onchange="loadWeek()"></div><div><label>عنوان الأسبوع</label><input id="week_title" placeholder="مثال: الأسبوع الأول"></div></div><div class="row"><div><label>من تاريخ</label><input id="from_date" type="date"></div><div><label>إلى تاريخ</label><input id="to_date" type="date"></div></div><div class="actions"><button class="btn gold" onclick="newWeek()">➕ أسبوع جديد / سجل فارغ</button><button class="btn teal" onclick="loadWeek()">🔄 فتح الأسبوع</button></div></section>
<section class="card"><h2>سجل الحضور والانصراف — الأيام الخمسة</h2><table><thead><tr><th>اليوم</th><th>الحضور</th><th>الانصراف</th><th>نوع الدوام</th><th>المهمة</th><th>ملاحظات</th></tr></thead><tbody id="daysBody"></tbody></table><div class="actions"><button class="btn primary" onclick="saveWeekDB()">💾 حفظ الأسبوع في القاعدة</button><button class="btn outline" onclick="exportWeekJSON()">JSON 💾</button><button class="btn outline" onclick="window.print()">طباعة 🖨️</button></div></section>
<section class="card"><h2>أرشيف الأسابيع المحفوظة</h2><div id="archive" class="list"></div></section></div>
<script>
const DAYS=['الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
function renderDays(days){days=days||[]; document.getElementById('daysBody').innerHTML=DAYS.map((d,i)=>{const r=days[i]||{}; return '<tr><td><b>'+d+'</b></td><td><input type="time" id="in_'+i+'" value="'+(r.check_in||r.in||'08:00')+'"></td><td><input type="time" id="out_'+i+'" value="'+(r.check_out||r.out||(i===4?'11:30':'14:00'))+'"></td><td><select id="type_'+i+'"><option '+((r.type||'دوام رسمي')==='دوام رسمي'?'selected':'')+'>دوام رسمي</option><option '+(r.type==='زيارة ميدانية'?'selected':'')+'>زيارة ميدانية</option><option '+(r.type==='عمل مكتبي'?'selected':'')+'>عمل مكتبي</option><option '+(r.type==='عن بعد'?'selected':'')+'>عن بعد</option><option '+(r.type==='إجازة'?'selected':'')+'>إجازة</option></select></td><td><input id="task_'+i+'" value="'+(r.task||'')+'" placeholder="المهمة الرئيسية"></td><td><input id="note_'+i+'" value="'+(r.note||'')+'" placeholder="ملاحظة"></td></tr>'}).join('')}
function collectWeek(){const week=Number(document.getElementById('week_number').value)||1; const days=DAYS.map((d,i)=>({day:d,check_in:document.getElementById('in_'+i).value,check_out:document.getElementById('out_'+i).value,type:document.getElementById('type_'+i).value,task:document.getElementById('task_'+i).value,note:document.getElementById('note_'+i).value})); return {week_number:week,week_title:document.getElementById('week_title').value||('الأسبوع '+week),work_date:document.getElementById('from_date').value||null,day_name:'أسبوعي',check_in:days[0].check_in,check_out:days[days.length-1].check_out,task_type:'متابعة أسبوعية',task_details:days.map(x=>x.task).filter(Boolean).join(' | '),tasks:days.map(x=>x.task).filter(Boolean).join(' | '),notes:'من '+document.getElementById('from_date').value+' إلى '+document.getElementById('to_date').value,full_data:{from_date:document.getElementById('from_date').value,to_date:document.getElementById('to_date').value,days:days},updated_at:new Date().toISOString()}}
async function saveWeekDB(){const sb=SB(); if(!sb){showMsg('msg','لم يتم تحميل Supabase','err');return} const row=collectWeek(); const r=await sb.from('daily_work_logs').upsert(row,{onConflict:'week_number'}).select(); if(r.error) showMsg('msg','فشل الحفظ: '+r.error.message,'err'); else {showMsg('msg','تم حفظ الأسبوع رقم '+row.week_number+' في القاعدة','ok'); loadArchive();}}
async function loadWeek(){const sb=SB(); if(!sb)return; const w=Number(document.getElementById('week_number').value)||1; const r=await sb.from('daily_work_logs').select('*').eq('week_number',w).maybeSingle(); if(r.error){showMsg('msg','فشل فتح الأسبوع: '+r.error.message,'err');return} if(!r.data){newWeek(false); showMsg('msg','أسبوع جديد فارغ جاهز للإدخال.','warn');return} const d=r.data; document.getElementById('week_title').value=d.week_title||('الأسبوع '+w); document.getElementById('from_date').value=(d.full_data&&d.full_data.from_date)||d.work_date||''; document.getElementById('to_date').value=(d.full_data&&d.full_data.to_date)||''; renderDays((d.full_data&&d.full_data.days)||[]); showMsg('msg','تم فتح الأسبوع رقم '+w,'ok')}
function newWeek(clearTitle=true){if(clearTitle) document.getElementById('week_title').value='الأسبوع '+(document.getElementById('week_number').value||1); document.getElementById('from_date').value=''; document.getElementById('to_date').value=''; renderDays([])}
async function loadArchive(){const sb=SB(); if(!sb)return; const r=await sb.from('daily_work_logs').select('*').order('week_number',{ascending:true}); const rows=r.data||[]; document.getElementById('archive').innerHTML=rows.map(x=>'<div class="file-row"><div><b>الأسبوع '+x.week_number+'</b><br><small>'+ (x.week_title||'') +' — '+(x.notes||'')+'</small></div><button class="btn outline" onclick="document.getElementById(\'week_number\').value='+x.week_number+';loadWeek()">فتح</button></div>').join('')||'<div class="msg warn">لا توجد أسابيع محفوظة بعد.</div>'}
function exportWeekJSON(){jsonDownload('alfalah_week_'+(document.getElementById('week_number').value||1)+'.json',collectWeek())}
document.addEventListener('DOMContentLoaded',function(){renderDays([]); loadWeek(); loadArchive();});
</script></body></html>
