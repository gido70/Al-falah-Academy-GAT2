<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>جدول الدوام والمهام</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="../assets/css/style.css"></head><body><script src="../assets/js/supabaseClient.js"></script><script src="../assets/js/common.js"></script><script>pageHeader('جدول الدوام والمهام اليومية')</script>
<div class="card"><h2>بيانات الأسبوع</h2><div id="msg" class="msg">اكتب رقم الأسبوع. إذا كان محفوظًا سيتم جلبه، وإذا كان جديدًا سيفتح نموذجًا فارغًا.</div><div class="grid"><div><label>رقم الأسبوع</label><input type="number" id="week_number" min="1" value="1"></div><div><label>عنوان الأسبوع</label><input id="week_title" placeholder="مثال: الأسبوع الأول"></div><div><label>تاريخ بداية الأسبوع</label><input type="date" id="work_date"></div><div><label>الحالة</label><select id="task_type"><option>دوام كامل</option><option>زيارة ميدانية</option><option>عمل مكتبي</option><option>إجازة</option></select></div></div><div class="row"><button class="btn gold" id="newWeek">➕ أسبوع جديد / فتح سجل فارغ</button><button class="btn" id="save">💾 حفظ الأسبوع</button><button class="btn out" id="load">↻ جلب الأسبوع</button></div></div>
<div class="card"><h2>الحضور والمهام</h2><div class="grid"><div><label>الحضور</label><input type="time" id="check_in"></div><div><label>الانصراف</label><input type="time" id="check_out"></div></div><label>المهام المنجزة</label><textarea id="tasks"></textarea><label>الملاحظات</label><textarea id="notes"></textarea></div>
<div class="card"><h2>أرشيف الأسابيع</h2><div id="weeks"></div></div>
<script>
function clearForm(keepWeek=true){const wk=val('week_number'); document.querySelectorAll('input,textarea,select').forEach(el=>{if(keepWeek&&el.id==='week_number')return; if(el.tagName==='SELECT')el.selectedIndex=0; else el.value=''}); if(keepWeek)setVal('week_number',wk)}
async function loadWeek(){const week=Number(val('week_number')); if(!week){showMsg('msg','اكتب رقم الأسبوع','bad');return} const {data,error}=await sb.from('daily_work_logs').select('*').eq('week_number',week).limit(1); if(error){showMsg('msg',error.message,'bad');return} const r=data?.[0]; clearForm(true); if(!r){showMsg('msg','هذا أسبوع جديد. النموذج فارغ ولن يمس أي أسبوع سابق.','ok');return} setVal('week_title',r.week_title);setVal('work_date',r.work_date);setVal('task_type',r.task_type);setVal('check_in',r.check_in);setVal('check_out',r.check_out);setVal('tasks',r.tasks||r.task_details);setVal('notes',r.notes);showMsg('msg','تم جلب بيانات الأسبوع '+week,'ok')}
async function saveWeek(){const week=Number(val('week_number')); if(!week){showMsg('msg','اكتب رقم الأسبوع','bad');return} const payload={week_number:week,week_title:val('week_title'),work_date:val('work_date')||null,task_type:val('task_type'),check_in:val('check_in')||null,check_out:val('check_out')||null,tasks:val('tasks'),task_details:val('tasks'),notes:val('notes'),full_data:{},updated_at:new Date().toISOString()}; const {error}=await sb.from('daily_work_logs').upsert(payload,{onConflict:'week_number'}); if(error)showMsg('msg','خطأ الحفظ: '+error.message,'bad'); else {showMsg('msg','تم حفظ الأسبوع في القاعدة. سيظهر من أي جهاز.','ok'); listWeeks()}}
async function listWeeks(){const {data}=await sb.from('daily_work_logs').select('*').order('week_number'); const box=document.getElementById('weeks'); if(!data?.length){box.innerHTML='<div class="msg">لا توجد أسابيع محفوظة بعد.</div>';return} box.innerHTML='<table><tr><th>الأسبوع</th><th>العنوان</th><th>التاريخ</th><th>الحالة</th><th>فتح</th></tr>'+data.map(r=>`<tr><td>${r.week_number||''}</td><td>${r.week_title||''}</td><td>${r.work_date||''}</td><td>${r.task_type||''}</td><td><button class="btn out" onclick="setVal('week_number','${r.week_number}');loadWeek()">فتح</button></td></tr>`).join('')+'</table>'}
document.getElementById('week_number').addEventListener('change',loadWeek);document.getElementById('load').onclick=loadWeek;document.getElementById('save').onclick=saveWeek;document.getElementById('newWeek').onclick=()=>{clearForm(true);showMsg('msg','سجل فارغ للأسبوع '+val('week_number'),'ok')};listWeeks();
</script><script>pageFooter()</script></body></html>
