<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>جدول الدوام والمهام اليومية</title><link rel="stylesheet" href="../assets/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js"></script><script src="../assets/app.js"></script></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>جدول الدوام والمهام اليومية</h1><p>كل أسبوع محفوظ كسجل مستقل في Supabase</p></section><div class="card"><h2>بيانات الأسبوع</h2><div class="row"><div><label>رقم الأسبوع</label><input id="week_number" type="number" min="1" value="1"></div><div><label>عنوان الأسبوع</label><input id="week_title" placeholder="مثلاً: أسبوع الزيارات الميدانية"></div><div><label>من تاريخ</label><input id="date_from" type="date"></div><div><label>إلى تاريخ</label><input id="date_to" type="date"></div></div><div class="nav"><button class="btn gold" onclick="newWeek()">➕ أسبوع جديد / سجل فارغ</button><button class="btn outline" onclick="loadWeek()">فتح الأسبوع</button></div><div id="msg"></div></div><div class="card"><h2>أيام الأسبوع</h2><div class="grid" id="days"></div></div><div class="card"><h2>ملاحظات وطلبات</h2><textarea id="notes" placeholder="اكتب ملاحظات الأسبوع أو احتياجات المتابعة..."></textarea><div class="nav"><button class="btn teal" onclick="saveWeek()">💾 حفظ الأسبوع في القاعدة</button><button class="btn primary" onclick="listWeeks()">📋 عرض الأسابيع المحفوظة</button></div><div id="weeksList"></div></div></div><script>
const DAYS=['الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];function renderDays(){q('days').innerHTML=DAYS.map((d,i)=>`<div class="card"><h3>${d}</h3><label>الحضور</label><input type="time" id="in_${i}"><label>الانصراف</label><input type="time" id="out_${i}"><label>نوع العمل</label><select id="type_${i}"><option>دوام كامل</option><option>زيارة ميدانية</option><option>عمل مكتبي</option><option>اجتماع</option><option>إجازة</option></select><label>المهام</label><textarea id="task_${i}"></textarea></div>`).join('')}
function clearForm(keepWeek=true){const wk=q('week_number').value;document.querySelectorAll('input,textarea').forEach(e=>{if(keepWeek&&e.id==='week_number')return;e.value=''});document.querySelectorAll('select').forEach(e=>e.selectedIndex=0);if(keepWeek)q('week_number').value=wk}
function collect(){return {week_number:Number(q('week_number').value),week_title:q('week_title').value,date_from:q('date_from').value,date_to:q('date_to').value,notes:q('notes').value,days:DAYS.map((d,i)=>({day_name:d,check_in:q('in_'+i).value,check_out:q('out_'+i).value,task_type:q('type_'+i).value,task_details:q('task_'+i).value}))}}
function apply(data){const f=data?.full_data||data||{};q('week_title').value=f.week_title||data.week_title||'';q('date_from').value=f.date_from||'';q('date_to').value=f.date_to||'';q('notes').value=f.notes||data.notes||'';(f.days||[]).forEach((r,i)=>{if(q('in_'+i))q('in_'+i).value=r.check_in||'';if(q('out_'+i))q('out_'+i).value=r.check_out||'';if(q('type_'+i))q('type_'+i).value=r.task_type||'دوام كامل';if(q('task_'+i))q('task_'+i).value=r.task_details||''})}
async function saveWeek(){const d=collect();if(!d.week_number){showMsg('msg','اكتب رقم الأسبوع.','err');return}const sb=SB();const {error}=await sb.from('daily_work_logs').upsert({week_number:d.week_number,week_title:d.week_title,notes:d.notes,full_data:d,updated_at:new Date().toISOString()},{onConflict:'week_number'});if(error){showMsg('msg','فشل الحفظ: '+error.message,'err')}else{showMsg('msg','تم حفظ الأسبوع '+d.week_number+' في Supabase.','ok')}}
async function loadWeek(){const week=Number(q('week_number').value);if(!week){showMsg('msg','اكتب رقم الأسبوع.','warn');return}clearForm(true);const sb=SB();const {data,error}=await sb.from('daily_work_logs').select('*').eq('week_number',week).limit(1);if(error){showMsg('msg','خطأ في الاسترجاع: '+error.message,'err');return}if(data&&data.length){apply(data[0]);showMsg('msg','تم فتح الأسبوع '+week+'.','ok')}else{showMsg('msg','هذا أسبوع جديد، النموذج فارغ وجاهز للإدخال.','warn')}}
function newWeek(){clearForm(true);showMsg('msg','تم فتح سجل فارغ للأسبوع '+q('week_number').value+'.','ok')}
async function listWeeks(){const sb=SB();const {data,error}=await sb.from('daily_work_logs').select('*').order('week_number',{ascending:true});if(error){q('weeksList').innerHTML='<div class="msg err">'+error.message+'</div>';return}q('weeksList').innerHTML='<table><tr><th>الأسبوع</th><th>العنوان</th><th>آخر تحديث</th><th>فتح</th></tr>'+(data||[]).map(r=>`<tr><td>${r.week_number}</td><td>${r.week_title||'—'}</td><td>${(r.updated_at||'').slice(0,10)}</td><td><button class="btn outline" onclick="q('week_number').value=${r.week_number};loadWeek()">فتح</button></td></tr>`).join('')+'</table>'}
document.addEventListener('DOMContentLoaded',()=>{renderDays();q('week_number').addEventListener('change',loadWeek)})
</script></body></html>
