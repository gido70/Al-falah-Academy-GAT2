<!doctype html><html lang="ar" dir="rtl"><head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>واجهة تقييم AI</title><style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');:root{--navy:#0c447c;--blue:#185fa5;--teal:#0f9d8a;--gold:#ba7517;--amber:#f0a500;--bg:#e8f0fa;--text:#0c2a4a;--muted:#5a7fa8;--border:#b8d4f0;--green:#0f6e56;--red:#c0392b;--grad:linear-gradient(160deg,#0c447c,#185fa5,#0f6e56)}*{box-sizing:border-box}body{margin:0;font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#e8f0fa,#f7fbff);color:var(--text);direction:rtl}.wrap{max-width:1180px;margin:auto;padding:16px 16px 90px}.hero{background:var(--grad);border-radius:24px;padding:28px 24px;color:white;text-align:center;box-shadow:0 14px 36px rgba(12,68,124,.25);position:relative;overflow:hidden}.logo{display:block;max-width:270px;width:72%;margin:0 auto 14px;background:rgba(255,255,255,.96);padding:12px 20px;border-radius:18px}.hero h1{margin:0;font-size:30px;font-weight:900}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86)}.home-return-btn{position:fixed;top:14px;right:14px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:999px;background:linear-gradient(135deg,#0c447c,#185fa5,#0f9d8a);color:#fff!important;text-decoration:none;font-weight:900;font-size:13px;box-shadow:0 6px 18px rgba(12,68,124,.28);border:1px solid rgba(255,255,255,.45)}.nav,.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px}.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:14px;text-decoration:none;border:0;font-family:'Cairo',sans-serif;font-weight:800;cursor:pointer}.primary{background:white;color:var(--navy)}.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:white}.teal{background:linear-gradient(135deg,var(--green),var(--teal));color:white}.outline{background:#fff;border:2px solid var(--border);color:var(--navy)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:18px 0}.card{background:white;border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:0 4px 18px rgba(12,68,124,.08)}.card h2,.card h3{margin:0 0 10px;color:var(--navy);font-weight:900}.muted{color:var(--muted);font-size:14px}.main-card{min-height:210px;display:flex;flex-direction:column;justify-content:space-between;border-right:7px solid var(--gold)}.main-card .ico{font-size:34px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.kpi{text-align:center;background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px}.kpi strong{font-size:30px;color:var(--navy);display:block}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th{background:var(--navy);color:#fff;padding:10px;font-size:13px}td{border-bottom:1px solid #e8eef5;padding:10px;text-align:center;font-size:13px}td:first-child,th:first-child{text-align:right}.tag{display:inline-block;padding:4px 10px;border-radius:999px;background:#e6f1fb;color:var(--navy);font-size:12px;font-weight:800}.note{border-right:5px solid var(--gold);background:#fff8e6;border-radius:14px;padding:14px;line-height:1.9}.footer{text-align:center;color:var(--muted);font-size:12px;margin:28px 0}input,select,textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;background:#f8fbff;color:var(--text);outline:none}textarea{min-height:100px;resize:vertical}label{display:block;font-weight:800;color:var(--navy);margin:10px 0 5px}.filebox{border:2px dashed var(--border);border-radius:18px;padding:16px;background:#f8fbff}.file-list{display:grid;gap:8px;margin-top:12px}.file-row{display:flex;justify-content:space-between;gap:8px;align-items:center;background:white;border:1px solid var(--border);border-radius:12px;padding:10px;font-size:13px}.ok{color:var(--green);font-weight:900}.warn{color:var(--red);font-weight:900}@media(max-width:850px){.grid,.grid2,.kpis{grid-template-columns:1fr}.hero h1{font-size:22px}.wrap{padding:10px 10px 90px}.logo{max-width:220px}.home-return-btn{top:auto;bottom:16px;right:16px}.card{padding:14px}}@media print{.home-return-btn,.nav,.actions,.no-print{display:none!important}.hero{box-shadow:none}.card{break-inside:avoid;box-shadow:none}}.alfalah-fixed-home{position:fixed;top:14px;right:14px;z-index:999999;background:linear-gradient(135deg,#0c447c,#0f9d8a);color:#fff!important;text-decoration:none!important;padding:10px 16px;border-radius:22px;font-family:Cairo,Tahoma,Arial,sans-serif;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.22)}@media(max-width:700px){.alfalah-fixed-home{top:auto;bottom:12px;right:12px}}</style></head><body><a class="alfalah-fixed-home" href="../index.html">🏠 الرئيسية</a><a class="home-return-btn" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png" alt="شعار أكاديمية الفلاح"><h1>واجهة تقييم AI</h1><p>تقييم جودة التقرير والتحليل قبل مشاركته مع الإدارة</p><div class="nav"><a class="btn primary" href="../index.html">🏠 الرئيسية</a><button class="btn gold" onclick="analyze()">تقييم التقرير</button><button class="btn teal" onclick="saveAI()">حفظ تقييم AI</button></div></section><section class="card"><h2>أدخل نص التقرير</h2><textarea id="reportText" placeholder="الصق هنا التقرير النهائي أو ملخص الزيارة..."></textarea></section><section class="grid"><div class="card"><h3>الدقة المهنية</h3><select id="s1"><option value="6">ممتازة</option><option value="5">جيدة جداً</option><option value="4">جيدة</option><option value="3">تحتاج تحسين</option></select></div><div class="card"><h3>شمول التقييم</h3><select id="s2"><option value="6">شامل</option><option value="5">جيد جداً</option><option value="4">جيد</option><option value="3">ناقص</option></select></div><div class="card"><h3>سلامة التوصيات</h3><select id="s3"><option value="6">واضحة وقابلة للتنفيذ</option><option value="5">جيدة جداً</option><option value="4">جيدة</option><option value="3">عامة جداً</option></select></div></section><section class="card"><h2>نتيجة التقييم</h2><div id="aiResult" class="note">اضغط تقييم التقرير.</div></section><script>function analyze(){const text=reportText.value.trim();const vals=[s1,s2,s3].map(x=>Number(x.value));const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);let notes=[];if(text.length<500)notes.push('النص قصير، يفضل إضافة شواهد وأمثلة من كل مكتبة.');if(!text.includes('توص'))notes.push('أضف فقرة توصيات واضحة وقابلة للتنفيذ.');if(!text.includes('نقاط')&&!text.includes('قوة'))notes.push('أضف نقاط القوة والضعف بصياغة مباشرة.');if(!notes.length)notes.push('التقرير متوازن ويمكن مشاركته بعد مراجعة الأرقام.');aiResult.innerHTML='<b>المتوسط: '+avg+' من 6</b><br>'+notes.map(n=>'• '+n).join('<br>')}async function saveAI(){const data={text:reportText.value,scores:[Number(s1.value),Number(s2.value),Number(s3.value)],result:aiResult.innerText,created_at:new Date().toISOString()};localStorage.setItem('alfalah_ai_review',JSON.stringify(data));if(window.alfalahSupabase)await window.alfalahSupabase.from('ai_reviews').insert([{review_text:data.text,score:data.scores.reduce((a,b)=>a+b,0)/3,full_data:data}]);alert('تم حفظ تقييم AI')}</script><div class="footer">أكاديمية الفلاح — منصة تطوير المكتبات ومراكز مصادر التعلم 2026</div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=20260502b"></script>
<script src="../supabase-config.js?v=20260502b"></script>
<script src="../assets/db-sync.js?v=20260502b"></script>
</body></html>
