<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تقييم AI</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="../assets/css/style.css"></head><body><script src="../assets/js/supabaseClient.js"></script><script src="../assets/js/common.js"></script><script>pageHeader('واجهة تقييم AI')</script>
<div class="card"><h2>مراجعة تقييمات الذكاء الاصطناعي</h2><div id="msg" class="msg">هذه الصفحة لتوثيق تقييمك لجودة مخرجات AI.</div><label>المدرسة</label><select id="school"></select><label>درجة AI من 10</label><input type="number" id="score" min="0" max="10"><label>ملخص المراجعة</label><textarea id="summary"></textarea><label>التوصيات</label><textarea id="recommendations"></textarea><button class="btn" id="save">💾 حفظ تقييم AI</button></div>
<script>loadSchools('school');document.getElementById('save').onclick=async()=>{const school_id=Number(val('school'))||null; const payload={school_id,ai_score:val('score')||null,ai_summary:val('summary'),ai_recommendations:val('recommendations'),full_data:{}}; const {error}=await sb.from('ai_reviews').insert(payload); if(error)showMsg('msg',error.message,'bad'); else showMsg('msg','تم حفظ تقييم AI.','ok')}</script><script>pageFooter()</script></body></html>
