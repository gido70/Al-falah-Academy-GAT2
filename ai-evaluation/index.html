<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تقييم AI</title><link rel="stylesheet" href="../assets/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js"></script><script src="../assets/app.js"></script></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>تقييم AI</h1><p>واجهة لتسجيل مراجعة الذكاء الاصطناعي للتقييمات والتقارير</p></section><div class="card"><label>المدرسة</label><select id="school"></select><label>درجة AI</label><input id="score" type="number" min="0" max="100"><label>ملخص AI</label><textarea id="summary"></textarea><label>التوصيات</label><textarea id="recommendations"></textarea><div class="nav"><button class="btn teal" onclick="saveAI()">💾 حفظ تقييم AI</button><button class="btn primary" onclick="loadAI()">📋 عرض السجل</button></div><div id="msg"></div></div><div id="list"></div></div><script>
async function saveAI(){const s=schoolById(q('school').value);if(!s){showMsg('msg','اختر المدرسة.','err');return}const rec={school_id:s.id,score:Number(q('score').value||0),ai_score:Number(q('score').value||0),ai_summary:q('summary').value,ai_recommendations:q('recommendations').value,full_data:{school:s,summary:q('summary').value,recommendations:q('recommendations').value}};const {error}=await SB().from('ai_reviews').insert(rec);if(error)showMsg('msg',error.message,'err');else{showMsg('msg','تم الحفظ.','ok');loadAI()}}
async function loadAI(){const {data,error}=await SB().from('ai_reviews').select('*').order('created_at',{ascending:false});if(error){q('list').innerHTML='<div class="msg err">'+error.message+'</div>';return}q('list').innerHTML=(data||[]).map(r=>`<div class="card"><h3>${schoolById(r.school_id)?.name||'مدرسة'}</h3><b>${r.ai_score||r.score||0}</b><p>${r.ai_summary||''}</p><p>${r.ai_recommendations||''}</p></div>`).join('')||'<div class="card">لا توجد مراجعات AI.</div>'}
document.addEventListener('DOMContentLoaded',()=>{fillSchools('school');loadAI()})
</script></body></html>
