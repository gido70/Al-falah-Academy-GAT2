<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../assets/app.css?v=20260503"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js?v=20260503"></script><script src="../assets/app.js?v=20260503"></script><title>محلل AI</title><style>.manager-tools{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:15px 0}.checkgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}.checkitem{background:#f8fbff;border:1px solid var(--border);border-radius:12px;padding:10px}.report-box{background:white;border:1px solid var(--border);border-radius:16px;padding:22px;line-height:2;min-height:220px}.editable{outline:2px dashed transparent}.editable:focus{outline-color:var(--gold);background:#fffdf5}.chartbar{height:14px;background:#e5eef8;border-radius:999px;overflow:hidden}.chartbar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:999px}.pill{display:inline-flex;margin:3px;padding:5px 10px;border:1px solid var(--border);border-radius:999px;background:#f8fbff;font-weight:700;color:var(--navy)}.photo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}.photo-card{border:1px solid var(--border);border-radius:14px;background:#f8fbff;padding:10px;text-align:center;word-break:break-word}.photo-card img{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-bottom:8px}@media print{.home,.no-print,.manager-tools,.nav,.btn,button{display:none!important}.wrap{max-width:100%;padding:0}.hero{box-shadow:none;border-radius:0}.card,.report-box{box-shadow:none;border:0}}</style></head><body><a class="home" href="../index.html">🏠 الرئيسية</a>
<div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png" alt="شعار أكاديمية الفلاح"><h1>محلل AI من بيانات القاعدة</h1><p>اختر مصدر البيانات من القاعدة، ثم ولّد صياغة جاهزة للتقرير أو العرض الإداري</p><div class="nav"><a class="btn primary" href="../index.html">🏠 الرئيسية</a></div></section>
<section class="card"><h2>اختيار مصدر التحليل</h2><div id="status" class="msg warn">جاري تحميل البيانات...</div><div class="row"><div><label>نوع البيانات</label><select id="sourceType" onchange="populateItems()"><option value="weekly">التقارير/الأسابيع الأسبوعية</option><option value="evaluations">التقييمات والزيارات المكتبية</option><option value="files">الملفات والشواهد</option><option value="combined">تحليل شامل من كل البيانات</option></select></div><div><label>العنصر المطلوب تحليله</label><select id="sourceItem"></select></div></div><div class="row"><div><label>نوع الصياغة المطلوبة</label><select id="styleType"><option value="manager">صياغة للمدير</option><option value="summary">ملخص تنفيذي</option><option value="recommendations">توصيات عملية</option><option value="risks">مخاطر ونقاط تحتاج متابعة</option></select></div><div><label>درجة التفصيل</label><select id="detailLevel"><option value="short">مختصر</option><option value="medium">متوسط</option><option value="detailed">مفصل</option></select></div></div><div class="actions"><button class="btn teal" onclick="generateAIReport()">🤖 توليد صياغة من البيانات</button><button class="btn gold" onclick="saveAIAnalysis()">💾 حفظ التحليل في القاعدة</button><button class="btn outline" onclick="copyAI()">📋 نسخ</button></div></section>
<section class="card"><h2>النص المقترح القابل للتعديل</h2><textarea id="aiText" style="min-height:260px" placeholder="سيظهر النص هنا بعد التوليد، ويمكنك تعديله قبل نسخه أو حفظه."></textarea></section>
<section class="card"><h2>مؤشرات مستخرجة</h2><div id="aiStats" class="kpis"></div></section></div>
<script>
let weeks=[], evals=[], files=[], lastAnalysis={};
function esc(x){return (x==null||x==='')?'—':String(x)}
function schoolName(id,code){let s=SCHOOLS.find(x=>String(x.id)===String(id)||x.code===code); return s?s.name:(code||'غير محدد')}
async function loadAIData(){const sb=SB(); if(!sb){showMsg('status','لم يتم تحميل Supabase','err');return} const [w,e,f]=await Promise.all([sb.from('daily_work_logs').select('*').order('week_number',{ascending:true}),sb.from('library_evaluations').select('*').order('created_at',{ascending:false}),sb.from('school_files').select('*').order('created_at',{ascending:false})]); weeks=w.data||[]; evals=e.data||[]; files=f.data||[]; showMsg('status','تم تحميل البيانات من القاعدة. اختر نوع التحليل.','ok'); populateItems();}
function populateItems(){const t=document.getElementById('sourceType').value; const sel=document.getElementById('sourceItem'); if(t==='weekly') sel.innerHTML=weeks.map((r,i)=>'<option value="'+i+'">الأسبوع '+esc(r.week_number)+' — '+esc(r.week_title)+'</option>').join('')||'<option value="all">لا توجد أسابيع</option>'; if(t==='evaluations') sel.innerHTML=evals.map((r,i)=>'<option value="'+i+'">'+schoolName(r.school_id,r.school_code)+' — '+esc(r.visit_date)+'</option>').join('')||'<option value="all">لا توجد تقييمات</option>'; if(t==='files') sel.innerHTML=files.map((r,i)=>'<option value="'+i+'">'+esc(r.file_name)+' — '+schoolName(r.school_id,r.school_code)+'</option>').join('')||'<option value="all">لا توجد ملفات</option>'; if(t==='combined') sel.innerHTML='<option value="all">كل البيانات المتاحة</option>';}
function generateAIReport(){const t=document.getElementById('sourceType').value; const idx=document.getElementById('sourceItem').value; const style=document.getElementById('styleType').value; const detail=document.getElementById('detailLevel').value; let title='', body='', stats={weeks:weeks.length,evals:evals.length,files:files.length};
 if(t==='weekly'){const r=weeks[Number(idx)]||{}; title='تحليل الأسبوع رقم '+esc(r.week_number); body='يعكس سجل الأسبوع رقم '+esc(r.week_number)+' ('+esc(r.week_title)+') أعمال متابعة مرتبطة بالفترة المحددة. تظهر البيانات أن أبرز ما تم توثيقه هو: '+esc(r.tasks||r.task_details||r.notes)+'. ينصح باستكمال الشواهد المصاحبة لهذا الأسبوع وربطها بتقرير الإدارة الأسبوعي.';}
 if(t==='evaluations'){const r=evals[Number(idx)]||{}; title='تحليل زيارة / تقييم '+schoolName(r.school_id,r.school_code); body='تم تحليل تقييم '+schoolName(r.school_id,r.school_code)+' بتاريخ '+esc(r.visit_date)+'. الدرجة المسجلة: '+esc(r.total_score)+'، والمستوى: '+esc(r.final_level)+'. نقاط القوة: '+esc(r.strengths)+'. نقاط الضعف: '+esc(r.weaknesses)+'. التوصية المهنية: '+esc(r.recommendations)+'.';}
 if(t==='files'){const r=files[Number(idx)]||{}; title='تحليل شاهد/ملف '+esc(r.file_name); body='الملف المرفوع باسم '+esc(r.file_name)+' مرتبط بـ '+schoolName(r.school_id,r.school_code)+' ضمن فئة '+esc(r.file_category)+'. يمكن استخدام هذا الشاهد لتدعيم التقرير النهائي، ويفضل ربطه بمحور التقييم المناسب وذكر دلالته المهنية.';}
 if(t==='combined'){const avg=evals.length?Math.round(evals.reduce((a,r)=>a+(Number(r.total_score)||0),0)/evals.length):0; title='تحليل شامل للبيانات المتاحة'; body='بناءً على البيانات الحالية، يوجد '+weeks.length+' أسبوع/أسابيع موثقة، و '+evals.length+' تقييم/زيارة، و '+files.length+' ملف/شاهد. متوسط التقييم العام هو '+avg+'. تعكس البيانات حاجة إلى استكمال التوثيق في المدارس التي لم يكتمل تقييمها، وربط الشواهد المصورة والنماذج بتوصيات قابلة للتنفيذ.';}
 if(style==='manager') body='سعادة المدير/ة،\n\n'+body+'\n\nوعليه، أوصي باعتماد متابعة أسبوعية مختصرة تركز على المدارس ذات الأولوية، مع إظهار الشواهد والنتائج في تقرير الإدارة.';
 if(style==='summary') body='ملخص تنفيذي:\n'+body;
 if(style==='recommendations') body=body+'\n\nتوصيات مقترحة:\n1. استكمال التوثيق الناقص.\n2. ربط كل زيارة بشواهد وصور.\n3. تحديد مدارس الأولوية لخطة تحسين قصيرة.\n4. إرسال ملخص أسبوعي للإدارة.';
 if(style==='risks') body=body+'\n\nنقاط تحتاج متابعة:\n- نقص الشواهد لبعض البنود.\n- عدم اكتمال بعض التقييمات.\n- الحاجة إلى ربط النتائج بخطة زمنية واضحة.';
 if(detail==='detailed') body += '\n\nصياغة موسعة: يفضل دعم هذا التحليل بجدول مختصر يوضح المدرسة، التاريخ، أبرز الملاحظات، مستوى الإنجاز، والإجراء القادم.';
 document.getElementById('aiText').value=title+'\n\n'+body; document.getElementById('aiStats').innerHTML='<div class="kpi"><strong>'+weeks.length+'</strong><span>أسابيع</span></div><div class="kpi"><strong>'+evals.length+'</strong><span>تقييمات</span></div><div class="kpi"><strong>'+files.length+'</strong><span>ملفات</span></div>'; lastAnalysis={title,body,source_type:t,style,detail,full_data:{weeks,evals,files}};}
async function saveAIAnalysis(){const sb=SB(); if(!sb){alert('لم يتم تحميل Supabase');return} if(!document.getElementById('aiText').value) generateAIReport(); const r=await sb.from('ai_reviews').insert({review_text:document.getElementById('aiText').value,ai_summary:document.getElementById('aiText').value,ai_score:100,full_data:lastAnalysis}); if(r.error) alert('فشل الحفظ: '+r.error.message); else alert('تم حفظ تحليل AI في القاعدة');}
function copyAI(){navigator.clipboard.writeText(document.getElementById('aiText').value).then(()=>alert('تم نسخ النص'));}
document.addEventListener('DOMContentLoaded',loadAIData);
</script></body></html>
