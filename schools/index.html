<!doctype html><html lang="ar" dir="rtl"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ملفات المدارس</title><link rel="stylesheet" href="../assets/app.css?v=20260503"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js?v=20260502"></script><script src="../assets/app.js?v=20260503"></script></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>ملفات المدارس والوثائق</h1><p>رفع صور المكتبات، النماذج، وشهادات الأخصائيين إلى Supabase Storage</p></section><div class="card"><h2>اختر المدرسة</h2><select id="school" onchange="loadFiles()"></select><div id="msg"></div></div><div class="files"><div class="card"><h3>📷 صور المكتبة</h3><input type="file" id="library-images" multiple accept="image/*"><button class="btn teal" onclick="uploadFiles('library-images','library-images')">رفع الصور</button></div><div class="card"><h3>📄 النماذج وقوائم العمل</h3><input type="file" id="library-documents" multiple><button class="btn gold" onclick="uploadFiles('library-documents','library-documents')">رفع النماذج</button></div><div class="card"><h3>🎓 شهادات الأخصائي</h3><input type="file" id="specialist-certificates" multiple><button class="btn primary" onclick="uploadFiles('specialist-certificates','specialist-certificates')">رفع الشهادات</button></div></div><div class="card"><h2>الملفات المحفوظة</h2><div id="gallery" class="gallery"></div></div></div><script>
function bucketLabel(b){return {'library-images':'صور المكتبة','library-documents':'النماذج','specialist-certificates':'الشهادات'}[b]||b}
async function uploadFiles(inputId,bucket){const sid=q('school').value;const s=schoolById(sid);if(!s){showMsg('msg','اختر المدرسة أولاً.','err');return}const files=[...(q(inputId).files||[])];if(!files.length){showMsg('msg','اختر ملفاً واحداً على الأقل.','warn');return}const sb=SB();for(const file of files){const safe=file.name.replace(/[^\w.\-\u0600-\u06FF]+/g,'_');const path=`${s.code}/${bucket}/${Date.now()}_${safe}`;const up=await sb.storage.from(bucket).upload(path,file,{upsert:true});if(up.error){showMsg('msg','فشل رفع '+file.name+': '+up.error.message,'err');return}const pub=sb.storage.from(bucket).getPublicUrl(path).data.publicUrl;const rec={school_id:s.id,school_code:s.code,file_category:bucket,file_name:file.name,file_path:path,file_url:pub,file_type:file.type,file_size:file.size};const ins=await sb.from('school_files').insert(rec);if(ins.error){showMsg('msg','تم رفع الملف لكن فشل حفظ السجل: '+ins.error.message,'err');return}}
showMsg('msg','تم رفع الملفات وحفظها في القاعدة.','ok');q(inputId).value='';loadFiles()}
async function loadFiles(){
  const sid=q('school').value; const s=schoolById(sid); const gal=q('gallery'); if(!s){gal.innerHTML='';return}
  const sb=SB();
  const cats=['library-images','photos','library-documents','models','specialist-certificates','certificates'];
  const {data,error}=await sb.from('school_files').select('*').eq('school_id',s.id).in('file_category',cats).order('created_at',{ascending:false});
  if(error){gal.innerHTML='<div class="msg err">'+error.message+'</div>';return}
  const rows=data||[];
  gal.innerHTML=rows.map(f=>{
    const isImg=(f.file_type||'').startsWith('image/') || ['library-images','photos'].includes(f.file_category);
    const preview=(isImg && f.file_url)?'<img src="'+f.file_url+'" alt="'+(f.file_name||'')+'" loading="lazy" style="width:100%;height:160px;object-fit:cover;border-radius:12px;margin-bottom:8px;border:1px solid #c8d8ea">':'<div style="font-size:46px">📄</div>';
    return `<div class="thumb">${preview}<b>${bucketLabel(f.file_category)}</b><div class="muted" style="font-size:12px;word-break:break-word">${f.file_name||''}</div>${f.file_url?`<a class="btn outline" href="${f.file_url}" target="_blank">فتح</a>`:''}</div>`;
  }).join('')||'<div class="msg warn">لا توجد ملفات لهذه المدرسة بعد.</div>'
}
document.addEventListener('DOMContentLoaded',()=>{fillSchools('school');loadFiles()})
</script><script src="../assets/db-sync.js?v=20260502"></script></body></html>
