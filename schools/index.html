<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ملفات المدارس</title><link rel="stylesheet" href="../assets/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js"></script><script src="../assets/app.js"></script></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>ملفات المدارس والوثائق</h1><p>رفع صور المكتبات، النماذج، وشهادات الأخصائيين إلى Supabase Storage</p></section><div class="card"><h2>اختر المدرسة</h2><select id="school" onchange="loadFiles()"></select><div id="msg"></div></div><div class="files"><div class="card"><h3>📷 صور المكتبة</h3><input type="file" id="library-images" multiple accept="image/*"><button class="btn teal" onclick="uploadFiles('library-images','library-images')">رفع الصور</button></div><div class="card"><h3>📄 النماذج وقوائم العمل</h3><input type="file" id="library-documents" multiple><button class="btn gold" onclick="uploadFiles('library-documents','library-documents')">رفع النماذج</button></div><div class="card"><h3>🎓 شهادات الأخصائي</h3><input type="file" id="specialist-certificates" multiple><button class="btn primary" onclick="uploadFiles('specialist-certificates','specialist-certificates')">رفع الشهادات</button></div></div><div class="card"><h2>الملفات المحفوظة</h2><div id="gallery" class="gallery"></div></div></div><script>
function bucketLabel(b){return {'library-images':'صور المكتبة','library-documents':'النماذج','specialist-certificates':'الشهادات'}[b]||b}
async function uploadFiles(inputId,bucket){const sid=q('school').value;const s=schoolById(sid);if(!s){showMsg('msg','اختر المدرسة أولاً.','err');return}const files=[...(q(inputId).files||[])];if(!files.length){showMsg('msg','اختر ملفاً واحداً على الأقل.','warn');return}const sb=SB();for(const file of files){const safe=file.name.replace(/[^\w.\-\u0600-\u06FF]+/g,'_');const path=`${s.code}/${bucket}/${Date.now()}_${safe}`;const up=await sb.storage.from(bucket).upload(path,file,{upsert:true});if(up.error){showMsg('msg','فشل رفع '+file.name+': '+up.error.message,'err');return}const pub=sb.storage.from(bucket).getPublicUrl(path).data.publicUrl;const rec={school_id:s.id,school_code:s.code,file_category:bucket,file_name:file.name,file_path:path,file_url:pub,file_type:file.type,file_size:file.size};const ins=await sb.from('school_files').insert(rec);if(ins.error){showMsg('msg','تم رفع الملف لكن فشل حفظ السجل: '+ins.error.message,'err');return}}
showMsg('msg','تم رفع الملفات وحفظها في القاعدة.','ok');q(inputId).value='';loadFiles()}
async function loadFiles(){const sid=q('school').value;const s=schoolById(sid);const gal=q('gallery');if(!s){gal.innerHTML='';return}const sb=SB();const {data,error}=await sb.from('school_files').select('*').eq('school_id',s.id).order('created_at',{ascending:false});if(error){gal.innerHTML='<div class="msg err">'+error.message+'</div>';return}gal.innerHTML=(data||[]).map(f=>`<div class="thumb">${(f.file_type||'').startsWith('image/')?`<img src="${f.file_url}" alt="">`:'<div style="font-size:46px">📄</div>'}<b>${bucketLabel(f.file_category)}</b><div class="muted" style="font-size:12px">${f.file_name}</div><a class="btn outline" href="${f.file_url}" target="_blank">فتح</a></div>`).join('')||'<div class="msg warn">لا توجد ملفات لهذه المدرسة بعد.</div>'}
document.addEventListener('DOMContentLoaded',()=>{fillSchools('school');loadFiles()})
</script></body></html>
