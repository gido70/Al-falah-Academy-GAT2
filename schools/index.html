<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ملفات المدارس</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="../assets/css/style.css"></head><body><script src="../assets/js/supabaseClient.js"></script><script src="../assets/js/common.js"></script><script>pageHeader('ملفات المدارس: الصور والنماذج والشهادات')</script>
<div class="card"><h2>رفع ملف مركزي</h2><div id="msg" class="msg">اختر المدرسة ونوع الملف ثم ارفع. سيظهر الملف من الكمبيوتر والموبايل.</div><div class="grid"><div><label>المدرسة</label><select id="school"></select></div><div><label>نوع الملف</label><select id="category"><option value="images">صور المكتبة</option><option value="documents">النماذج وقوائم العمل</option><option value="certificates">شهادات الأخصائي</option></select></div><div><label>اختر الملفات</label><input type="file" id="files" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"></div></div><div class="row"><button class="btn" id="upload">📤 رفع وحفظ</button><button class="btn out" id="refresh">↻ تحديث العرض</button></div></div>
<div class="card"><h2>الملفات المحفوظة</h2><div id="list" class="files"></div></div>
<script>
loadSchools('school').then(()=>listFiles());
const bucketByCat={images:'library-images',documents:'library-documents',certificates:'specialist-certificates'};
async function uploadFiles(){const school_id=Number(val('school')); if(!school_id){showMsg('msg','اختر المدرسة','bad');return} const sel=document.getElementById('school'); const school_code=sel.options[sel.selectedIndex].dataset.code||String(school_id); const category=val('category'); const bucket=bucketByCat[category]; const files=document.getElementById('files').files; if(!files.length){showMsg('msg','اختر ملفًا واحدًا على الأقل','bad');return} for(const file of files){const safe=file.name.replace(/[^\w.\-\u0600-\u06FF]/g,'_'); const path=`${school_code}/${category}/${Date.now()}_${safe}`; const up=await sb.storage.from(bucket).upload(path,file,{upsert:true}); if(up.error){showMsg('msg','فشل رفع '+file.name+': '+up.error.message,'bad');return} const {data:pub}=sb.storage.from(bucket).getPublicUrl(path); const rec={school_id,school_code,file_category:category,file_name:file.name,file_path:path,file_url:pub.publicUrl,file_type:file.type,file_size:file.size}; const ins=await sb.from('school_files').insert(rec); if(ins.error){showMsg('msg','رُفع الملف لكن فشل حفظ الرابط: '+ins.error.message,'bad');return}}
showMsg('msg','تم الرفع والحفظ. افتح من الموبايل وستظهر الملفات.','ok'); document.getElementById('files').value=''; listFiles()}
async function listFiles(){const school_id=Number(val('school')); let q=sb.from('school_files').select('*').order('created_at',{ascending:false}).limit(100); if(school_id)q=q.eq('school_id',school_id); const {data,error}=await q; const box=document.getElementById('list'); if(error){box.innerHTML='<div class="msg bad">'+error.message+'</div>';return} if(!data?.length){box.innerHTML='<div class="msg">لا توجد ملفات بعد.</div>';return} box.innerHTML=data.map(f=>{const isImg=(f.file_type||'').startsWith('image/'); return `<div class="file-card">${isImg?`<img src="${f.file_url}" alt="">`:'📄'}<div><b>${f.file_name}</b></div><div class="small">${f.file_category}</div><a class="btn out" href="${f.file_url}" target="_blank">فتح</a></div>`}).join('')}
document.getElementById('upload').onclick=uploadFiles;document.getElementById('refresh').onclick=listFiles;document.getElementById('school').addEventListener('change',listFiles);
</script><script>pageFooter()</script></body></html>
