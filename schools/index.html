<!doctype html><html lang="ar" dir="rtl"><head>

<meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ملفات المدارس</title><link rel="stylesheet" href="../assets/app.css"><script src="../assets/app.js"></script><style>.alfalah-fixed-home{position:fixed;top:14px;right:14px;z-index:999999;background:linear-gradient(135deg,#0c447c,#0f9d8a);color:#fff!important;text-decoration:none!important;padding:10px 16px;border-radius:22px;font-family:Cairo,Tahoma,Arial,sans-serif;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.22)}@media(max-width:700px){.alfalah-fixed-home{top:auto;bottom:12px;right:12px}}.btn.danger{background:#d9534f;color:#fff}.btn.danger:hover{filter:brightness(.95)}.file-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}.clear-card{margin-top:12px;text-align:center}
.focus-card{outline:3px solid #f0a500;box-shadow:0 0 0 6px rgba(240,165,0,.18)!important}

/* === تنظيم عرض الملفات المحفوظة حسب النوع === */
.file-filter-tabs{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0 18px;
  padding:10px;background:linear-gradient(135deg,#f8fbff,#eef6ff);border:1px solid #d7e7f7;border-radius:16px;
}
.file-tab{
  border:2px solid #b8d4f0;background:#fff;color:#0c447c;border-radius:999px;
  padding:9px 16px;font-family:Cairo,Tahoma,Arial,sans-serif;font-weight:900;font-size:14px;cursor:pointer;
  transition:all .18s;box-shadow:0 2px 8px rgba(12,68,124,.05);
}
.file-tab:hover{transform:translateY(-2px);border-color:#185fa5;background:#f0f8ff;}
.file-tab.active{background:linear-gradient(135deg,#0c447c,#0f9d8a);color:#fff;border-color:#0f9d8a;}
.file-group{margin:18px 0 24px;}
.file-group-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  background:linear-gradient(90deg,#fef9ee,#ffffff);border-right:5px solid #ba7517;
  border-radius:14px;padding:12px 14px;margin-bottom:12px;border:1px solid #e8d7b5;
}
.file-group-title{font-size:18px;font-weight:900;color:#0c447c;}
.file-group-count{font-size:12px;font-weight:900;color:#633806;background:#faeeda;border-radius:999px;padding:4px 12px;}
.file-group .gallery{margin-top:0;}
.file-empty{background:#fff8e8;border:1px solid #fac775;color:#633806;border-radius:14px;padding:14px;text-align:center;font-weight:800;}
.file-type-note{font-size:13px;color:#5a7fa8;text-align:center;margin:-6px 0 12px;line-height:1.8;}

</style></head><body><a class="alfalah-fixed-home" href="../index.html">🏠 الرئيسية</a><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>ملفات المدارس والوثائق</h1><p>رفع صور المكتبات، النماذج، وشهادات الأخصائيين إلى Supabase Storage</p></section><div class="card"><h2>اختر المدرسة</h2><select id="school" onchange="loadFiles()"></select><div id="msg"></div><div class="clear-card"><button class="btn danger" type="button" onclick="deleteAllSchoolFiles()">🗑️ تصفير ملفات هذه المدرسة</button></div></div><div class="files"><div class="card"><h3>📷 صور المكتبة</h3><input type="file" id="library-images" multiple accept="image/*"><button class="btn teal" onclick="uploadFiles('library-images','library-images')">رفع الصور</button></div><div class="card"><h3>📄 النماذج وقوائم العمل</h3><input type="file" id="library-documents" multiple><button class="btn gold" onclick="uploadFiles('library-documents','library-documents')">رفع النماذج</button></div><div class="card"><h3>🎓 شهادات الأخصائي</h3><input type="file" id="specialist-certificates" multiple><button class="btn primary" onclick="uploadFiles('specialist-certificates','specialist-certificates')">رفع الشهادات</button></div></div><div class="card"><h2>الملفات المحفوظة</h2>
  <div class="file-type-note">اختر نوع الملفات لعرضه منفصلًا، أو استخدم عرض الكل لعرضها مرتبة بعناوين واضحة.</div>
  <div class="file-filter-tabs" id="fileFilterTabs">
    <button type="button" class="file-tab active" data-filter="all" onclick="setFileFilter('all')">📁 عرض الكل</button>
    <button type="button" class="file-tab" data-filter="library-images" onclick="setFileFilter('library-images')">📷 صور المكتبة</button>
    <button type="button" class="file-tab" data-filter="library-documents" onclick="setFileFilter('library-documents')">📄 النماذج والقوائم</button>
    <button type="button" class="file-tab" data-filter="specialist-certificates" onclick="setFileFilter('specialist-certificates')">🎓 شهادات الأخصائي</button>
  </div>
  <div id="gallery"></div>
</div></div>
<script>
function bucketLabel(b){return {'library-images':'صور المكتبة','photos':'صور المكتبة','library-documents':'النماذج','documents':'النماذج','specialist-certificates':'الشهادات','certificates':'الشهادات'}[b]||b}
function safeStorageName(name){
  const ext=(name.match(/\.[A-Za-z0-9]{1,8}$/)||[''])[0].toLowerCase();
  const base=name.replace(/\.[^.]+$/,'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_-]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'').slice(0,80) || 'file';
  return base+ext;
}
async function uploadFiles(inputId,bucket){
  const sid=q('school').value;const s=schoolById(sid);if(!s){showMsg('msg','اختر المدرسة أولاً.','err');return}
  const files=[...(q(inputId).files||[])];if(!files.length){showMsg('msg','اختر ملفاً واحداً على الأقل.','warn');return}
  const sb=SB(); if(!sb){showMsg('msg','لم يتم الاتصال بـ Supabase.','err');return}
  let ok=0;
  for(const file of files){
    const safe=safeStorageName(file.name);
    const path=`${s.code}/${bucket}/${Date.now()}_${Math.random().toString(36).slice(2,8)}_${safe}`;
    const up=await sb.storage.from(bucket).upload(path,file,{upsert:true,contentType:file.type||'application/octet-stream'});
    if(up.error){showMsg('msg','فشل رفع '+file.name+': '+up.error.message,'err');continue}
    const pub=sb.storage.from(bucket).getPublicUrl(path).data.publicUrl;
    const rec={school_id:s.id,school_code:s.code,file_category:bucket,file_name:file.name,file_path:path,file_url:pub,file_type:file.type,file_size:file.size,notes:'uploaded_to_supabase'};
    const ins=await sb.from('school_files').insert(rec);
    if(ins.error){showMsg('msg','تم رفع الملف لكن فشل حفظ السجل: '+ins.error.message,'err');continue}
    ok++;
  }
  showMsg('msg','تم رفع وحفظ '+ok+' ملف/ملفات في Supabase.','ok');q(inputId).value='';loadFiles()
}
function filePreview(f){
  const url=f.file_url || '';
  const isImg=(f.file_type||'').startsWith('image/') || /\.(png|jpe?g|webp|gif)$/i.test(f.file_name||f.file_path||'');
  if(isImg && url) return `<img src="${url}" alt="${(f.file_name||'صورة').replace(/"/g,'')}" onerror="this.outerHTML='<div style=&quot;font-size:46px&quot;>🖼️</div>'">`;
  return '<div style="font-size:46px">📄</div>';
}

function escJs(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}
function storageBucketCandidates(bucket){
  const c=fileCategoryKey(bucket);
  const map={
    'library-images':['library-images','photos'],
    'library-documents':['library-documents','documents'],
    'specialist-certificates':['specialist-certificates','certificates']
  };
  return [...new Set([bucket,c,...(map[c]||[])].filter(Boolean))];
}
function storagePathCandidates(path,bucket){
  const raw=String(path||'').trim();
  const arr=[];
  if(raw) arr.push(raw);
  try{
    if(raw.startsWith('http')){
      const u=new URL(raw);
      const marker='/storage/v1/object/public/';
      const idx=u.pathname.indexOf(marker);
      if(idx>=0){
        const rest=decodeURIComponent(u.pathname.slice(idx+marker.length));
        const parts=rest.split('/');
        parts.shift();
        arr.push(parts.join('/'));
      }
    }
  }catch(e){}
  storageBucketCandidates(bucket).forEach(b=>{
    if(raw.startsWith(b+'/')) arr.push(raw.slice(b.length+1));
  });
  return [...new Set(arr.filter(Boolean))];
}
async function removeFromStorageBestEffort(sb,bucket,path,url){
  const buckets=storageBucketCandidates(bucket);
  const paths=[...storagePathCandidates(path,bucket),...storagePathCandidates(url,bucket)];
  for(const b of buckets){
    if(!paths.length) continue;
    try{
      const st=await sb.storage.from(b).remove(paths);
      if(st.error) console.warn('Storage delete warning for '+b+':',st.error.message);
    }catch(e){console.warn('Storage delete exception for '+b,e)}
  }
}
async function deleteFile(id,path,bucket){
  if(!id && !path){showMsg('msg','لا يمكن حذف الملف: رقم السجل أو مسار الملف غير موجود.','err');return}
  if(!confirm('هل تريد حذف هذا الملف نهائياً من القاعدة والصفحة؟')) return;
  const sb=SB(); if(!sb){showMsg('msg','لم يتم الاتصال بـ Supabase.','err');return}
  const row=(currentSchoolFiles||[]).find(f=>String(f.id)===String(id) || String(f.file_path||'')===String(path||'')) || {};
  try{
    // احذف من الواجهة مؤقتاً حتى لا يبقى الملف ظاهراً بعد الضغط
    currentSchoolFiles=(currentSchoolFiles||[]).filter(f=>String(f.id)!==String(id) && String(f.file_path||'')!==String(path||''));
    renderGallery();

    // حذف الملف من Storage كأفضل محاولة، ولا نوقف حذف سجل القاعدة إذا فشل التخزين
    await removeFromStorageBestEffort(sb,bucket || row.file_category,path || row.file_path,row.file_url);

    // حذف سجل القاعدة بعدة مفاتيح احتياطية لأن بعض السجلات القديمة قد لا تحمل id مضبوطاً
    let deleted=false;
    if(id){
      const del=await sb.from('school_files').delete().eq('id',id);
      if(del.error){console.warn('Delete by id failed:',del.error.message)} else deleted=true;
    }
    if(path){
      const del2=await sb.from('school_files').delete().eq('file_path',path);
      if(del2.error){console.warn('Delete by path failed:',del2.error.message)} else deleted=true;
    }
    if(row.file_url){
      const del3=await sb.from('school_files').delete().eq('file_url',row.file_url);
      if(del3.error){console.warn('Delete by url failed:',del3.error.message)} else deleted=true;
    }

    if(!deleted){
      await loadFiles();
      showMsg('msg','لم يكتمل حذف سجل الملف من قاعدة البيانات. راجع صلاحيات الحذف RLS في جدول school_files.','err');
      return;
    }
    showMsg('msg','تم حذف الملف من الصفحة وقاعدة البيانات. إذا بقيت صورة قديمة فاعمل تحديثاً قسرياً للمتصفح.','ok');
    setTimeout(loadFiles,400);
  }catch(e){console.error(e);await loadFiles();showMsg('msg','حدث خطأ أثناء الحذف: '+(e.message||e),'err')}
}
async function deleteAllSchoolFiles(){
  const sid=q('school').value; const s=schoolById(sid);
  if(!s){showMsg('msg','اختر المدرسة أولاً.','err');return}
  if(!confirm('سيتم حذف جميع ملفات هذه المدرسة من Supabase ومن الصفحة. هل أنت متأكد؟')) return;
  const sb=SB(); if(!sb){showMsg('msg','لم يتم الاتصال بـ Supabase.','err');return}
  try{
    const {data,error}=await sb.from('school_files').select('*').or(`school_id.eq.${s.id},school_code.eq.${s.code}`);
    if(error){showMsg('msg','فشل جلب الملفات للحذف: '+error.message,'err');return}
    const rows=data||[];
    if(!rows.length){showMsg('msg','لا توجد ملفات محفوظة لهذه المدرسة.','warn');return}
    const byBucket={};
    rows.forEach(f=>{ if(f.file_category && f.file_path){ (byBucket[f.file_category] ||= []).push(f.file_path); } });
    for(const bucket of Object.keys(byBucket)){
      const st=await sb.storage.from(bucket).remove(byBucket[bucket]);
      if(st.error){console.warn('Storage delete warning for '+bucket+':',st.error.message)}
    }
    const del=await sb.from('school_files').delete().or(`school_id.eq.${s.id},school_code.eq.${s.code}`);
    if(del.error){showMsg('msg','فشل حذف سجلات الملفات: '+del.error.message,'err');return}
    showMsg('msg','تم تصفير ملفات هذه المدرسة من Supabase ومن الصفحة.','ok');
    await loadFiles();
  }catch(e){console.error(e);showMsg('msg','حدث خطأ أثناء تصفير الملفات: '+(e.message||e),'err')}
}

let currentFileFilter='all';
let currentSchoolFiles=[];
function fileCategoryKey(cat){
  const c=String(cat||'').trim();
  if(c==='photos') return 'library-images';
  if(c==='documents') return 'library-documents';
  if(c==='certificates') return 'specialist-certificates';
  return c || 'other';
}
function fileCategoryTitle(cat){
  return {
    'library-images':'📷 صور المكتبة',
    'library-documents':'📄 النماذج والقوائم',
    'specialist-certificates':'🎓 شهادات الأخصائي',
    'other':'📁 ملفات أخرى'
  }[cat] || bucketLabel(cat);
}
function renderFileCard(f){
  return `<div class="thumb" data-file-id="${String(f.id||'').replace(/"/g,'')}">${filePreview(f)}<b>${bucketLabel(f.file_category)}</b><div class="muted" style="font-size:12px">${f.file_name||''}</div><div class="file-actions"><a class="btn outline" href="${f.file_url||'#'}" target="_blank">فتح</a><button type="button" class="btn danger" onclick="deleteFile('${escJs(f.id)}','${escJs(f.file_path)}','${escJs(f.file_category)}')">حذف</button></div></div>`;
}
function renderFileGroup(title,rows){
  return `<section class="file-group"><div class="file-group-head"><div class="file-group-title">${title}</div><div class="file-group-count">${rows.length} ملف</div></div><div class="gallery">${rows.map(renderFileCard).join('')}</div></section>`;
}
function renderGallery(){
  const gal=q('gallery');
  const rows=currentSchoolFiles||[];
  if(!rows.length){gal.innerHTML='<div class="msg warn">لا توجد ملفات محفوظة في Supabase لهذه المدرسة بعد.</div>';return}
  if(currentFileFilter!=='all'){
    const filtered=rows.filter(f=>fileCategoryKey(f.file_category)===currentFileFilter);
    gal.innerHTML=filtered.length ? renderFileGroup(fileCategoryTitle(currentFileFilter),filtered) : `<div class="file-empty">لا توجد ملفات محفوظة ضمن قسم ${fileCategoryTitle(currentFileFilter)} لهذه المدرسة.</div>`;
    return;
  }
  const order=['library-images','library-documents','specialist-certificates','other'];
  const groups={};
  rows.forEach(f=>{const k=fileCategoryKey(f.file_category);(groups[k] ||= []).push(f);});
  gal.innerHTML=order.filter(k=>groups[k]?.length).map(k=>renderFileGroup(fileCategoryTitle(k),groups[k])).join('') || '<div class="msg warn">لا توجد ملفات محفوظة في Supabase لهذه المدرسة بعد.</div>';
}
function setFileFilter(filter){
  currentFileFilter=filter||'all';
  document.querySelectorAll('.file-tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.filter===currentFileFilter));
  renderGallery();
}
async function loadFiles(){
  const sid=q('school').value;const s=schoolById(sid);const gal=q('gallery');if(!s){currentSchoolFiles=[];gal.innerHTML='';return}
  const sb=SB(); if(!sb){gal.innerHTML='<div class="msg err">لم يتم الاتصال بـ Supabase.</div>';return}
  const {data,error}=await sb.from('school_files').select('*').or(`school_id.eq.${s.id},school_code.eq.${s.code}`).order('created_at',{ascending:false});
  if(error){gal.innerHTML='<div class="msg err">'+error.message+'</div>';return}
  currentSchoolFiles=data||[];
  renderGallery();
}
function initSchoolFromUrl(){
  const params=new URLSearchParams(location.search);
  const code=params.get('school');
  const section=params.get('section');
  if(code){
    const s=schoolByCode(code);
    if(s && q('school')) q('school').value=s.id;
  }
  if(section){
    const el=q(section);
    if(el){
      setTimeout(()=>{el.closest('.card')?.scrollIntoView({behavior:'smooth',block:'center'}); el.closest('.card')?.classList.add('focus-card');},400);
    }
  }
}
document.addEventListener('DOMContentLoaded',()=>{fillSchools('school');initSchoolFromUrl();loadFiles()})
