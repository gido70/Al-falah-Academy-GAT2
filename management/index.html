<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مشاركة الإدارة</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="../assets/css/style.css"></head><body><script src="../assets/js/supabaseClient.js"></script><script src="../assets/js/common.js"></script><script>pageHeader('صفحة مشاركة الإدارة')</script>
<div class="card"><h2>تقرير أسبوعي للإدارة</h2><div id="msg" class="msg">اختر رقم الأسبوع ثم اضغط توليد.</div><label>رقم الأسبوع</label><input type="number" id="week_number" min="1" value="1"><div class="row"><button class="btn" id="build">📄 توليد التقرير</button><button class="btn out" onclick="window.print()">🖨️ طباعة</button></div></div><div class="card" id="report"><h2>التقرير</h2><div>لم يتم التوليد بعد.</div></div>
<script>
document.getElementById('build').onclick=async()=>{const week=Number(val('week_number')); const [{data:logs},{data:evals},{data:files}]=await Promise.all([sb.from('daily_work_logs').select('*').eq('week_number',week),sb.from('library_evaluations').select('*'),sb.from('school_files').select('*')]); const log=logs?.[0]||{}; document.getElementById('report').innerHTML=`<h2>التقرير الأسبوعي رقم ${week}</h2><div class="grid"><div class="stat"><b>${evals?.length||0}</b><div>تقييمات محفوظة</div></div><div class="stat"><b>${files?.length||0}</b><div>ملفات وصور</div></div><div class="stat"><b>${log.task_type||'-'}</b><div>حالة الأسبوع</div></div></div><h3>الملخص</h3><p>${log.tasks||'لا توجد مهام محفوظة لهذا الأسبوع.'}</p><h3>الملاحظات</h3><p>${log.notes||'لا توجد ملاحظات.'}</p>`; showMsg('msg','تم توليد التقرير.','ok')}
</script><script>pageFooter()</script></body></html>
