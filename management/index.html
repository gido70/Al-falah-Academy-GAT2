<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مشاركة الإدارة</title><link rel="stylesheet" href="../assets/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../supabase-config.js"></script><script src="../assets/app.js"></script></head><body><a class="home" href="../index.html">🏠 الرئيسية</a><div class="wrap"><section class="hero"><img class="logo" src="../assets/logo.png"><h1>صفحة مشاركة الإدارة</h1><p>تقرير أسبوعي مختصر يعرض مجريات العمل والإنجازات والخطوات القادمة</p></section><div class="card"><div class="row"><div><label>الأسبوع</label><input id="report_week" placeholder="مثلاً: الأسبوع 1"></div><div><label>تاريخ التقرير</label><input id="report_date" type="date"></div></div><label>ملخص تنفيذي</label><textarea id="summary"></textarea><label>الإنجازات</label><textarea id="achievements"></textarea><label>التحديات</label><textarea id="challenges"></textarea><label>الخطوات القادمة</label><textarea id="next_steps"></textarea><div class="nav"><button class="btn teal" onclick="saveReport()">💾 حفظ تقرير الإدارة</button><button class="btn primary" onclick="loadReports()">📋 عرض التقارير</button><button class="btn gold" onclick="window.print()">🖨️ طباعة</button></div><div id="msg"></div></div><div id="list"></div></div><script>
async function saveReport(){const d={report_week:q('report_week').value,report_date:q('report_date').value||null,summary:q('summary').value,achievements:q('achievements').value,challenges:q('challenges').value,next_steps:q('next_steps').value};const sb=SB();const {error}=await sb.from('management_reports').insert({...d,full_data:d});if(error)showMsg('msg','فشل الحفظ: '+error.message,'err');else{showMsg('msg','تم حفظ تقرير الإدارة.','ok');loadReports()}}
async function loadReports(){const sb=SB();const {data,error}=await sb.from('management_reports').select('*').order('created_at',{ascending:false});if(error){q('list').innerHTML='<div class="msg err">'+error.message+'</div>';return}q('list').innerHTML=(data||[]).map(r=>`<div class="card"><h2>${r.report_week||'تقرير'}</h2><p class="muted">${r.report_date||''}</p><h3>الملخص</h3><p>${r.summary||'—'}</p><h3>الإنجازات</h3><p>${r.achievements||'—'}</p><h3>التحديات</h3><p>${r.challenges||'—'}</p><h3>الخطوات القادمة</h3><p>${r.next_steps||'—'}</p></div>`).join('')||'<div class="card">لا توجد تقارير بعد.</div>'}
document.addEventListener('DOMContentLoaded',()=>{q('report_date').value=new Date().toISOString().slice(0,10);loadReports()})
</script></body></html>
